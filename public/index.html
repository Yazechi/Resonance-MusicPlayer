<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Resonance</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,300&display=swap" rel="stylesheet" />
    <script src="https://unpkg.com/@phosphor-icons/web@2.1.1/src/index.js"></script>
    <style>
      i.ph, i[class*="ph-"] { display:inline-flex; align-items:center; justify-content:center; }
      :root {
        --bg:        #0a0a0f;
        --surface:   #111118;
        --surface-2: #16161f;
        --surface-3: #1c1c28;
        --accent:    #e8ff5a;
        --accent-dim: rgba(232,255,90,0.12);
        --accent-glow: rgba(232,255,90,0.2);
        --red:       #ff4f64;
        --teal:      #00d4b1;
        --text:      #f0f0f8;
        --text-2:    #9494b0;
        --text-3:    #5a5a72;
        --border:    rgba(255,255,255,0.06);
        --border-2:  rgba(255,255,255,0.1);
        --r:         8px;
        --r-sm:      5px;
        --r-lg:      14px;
        --mono: 'Space Mono', monospace;
        --sans: 'DM Sans', sans-serif;
      }
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

      body {
        font-family: var(--sans);
        background: var(--bg);
        color: var(--text);
        font-size: 13px;
        line-height: 1.5;
        min-height: 100vh;
        /* subtle noise texture */
        background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.025'/%3E%3C/svg%3E");
      }

      ::-webkit-scrollbar { width: 4px; height: 4px; }
      ::-webkit-scrollbar-track { background: transparent; }
      ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.08); border-radius: 2px; }
      ::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.14); }

      /* ── Layout shell ─────────────────────── */
      #app {
        display: grid;
        grid-template-rows: auto 1fr;
        min-height: 100vh;
      }

      /* ── Top bar ─────────────────────────── */
      #topbar {
        display: flex;
        align-items: center;
        gap: 14px;
        padding: 12px 20px;
        border-bottom: 1px solid var(--border);
        background: rgba(10,10,15,0.9);
        backdrop-filter: blur(12px);
        position: sticky;
        top: 0;
        z-index: 100;
      }
      #logo {
        font-family: var(--mono);
        font-size: 15px;
        font-weight: 700;
        color: var(--accent);
        letter-spacing: -0.04em;
        flex-shrink: 0;
        display: flex;
        align-items: center;
        gap: 6px;
      }
      #logo::before {
        content: '';
        width: 8px; height: 8px;
        border-radius: 50%;
        background: var(--accent);
        box-shadow: 0 0 10px var(--accent);
        animation: pulse-dot 2s ease-in-out infinite;
      }
      @keyframes pulse-dot {
        0%,100% { opacity:1; transform:scale(1); }
        50% { opacity:0.5; transform:scale(0.7); }
      }
      #searchBar {
        flex: 1;
        max-width: 480px;
        position: relative;
      }
      #searchBar input {
        width: 100%;
        padding: 8px 36px 8px 14px;
        background: var(--surface-2);
        border: 1px solid var(--border);
        border-radius: 999px;
        color: var(--text);
        font-family: var(--sans);
        font-size: 13px;
        outline: none;
        transition: border-color 150ms, box-shadow 150ms;
      }
      #searchBar input::placeholder { color: var(--text-3); }
      #searchBar input:focus {
        border-color: rgba(232,255,90,0.4);
        box-shadow: 0 0 0 3px rgba(232,255,90,0.08);
      }
      #searchClear {
        position: absolute; right: 12px; top: 50%; transform: translateY(-50%);
        background: none; border: none; color: var(--text-3); cursor: pointer;
        font-size: 14px; padding: 0; line-height: 1;
        opacity: 0; pointer-events: none; transition: opacity 150ms;
      }
      #searchBar input:not(:placeholder-shown) + #searchClear {
        opacity: 1; pointer-events: all;
      }
      #searchSpinner {
        position: absolute; right: 10px; top: 50%; transform: translateY(-50%);
        display: none;
      }
      .spinner-sm {
        width: 14px; height: 14px;
        border: 2px solid rgba(255,255,255,0.08);
        border-top-color: var(--accent);
        border-radius: 50%;
        animation: spin 0.6s linear infinite;
        display: inline-block;
      }
      @keyframes spin { to { transform: rotate(360deg); } }
      #topBarRight {
        display: flex; gap: 6px; align-items: center; margin-left: auto;
      }

      /* ── Tab nav ─────────────────────────── */
      #tabNav {
        display: flex;
        gap: 2px;
        background: var(--surface);
        border-radius: 999px;
        padding: 3px;
      }
      .tab-btn {
        padding: 5px 14px;
        border-radius: 999px;
        border: none;
        background: none;
        color: var(--text-2);
        font-family: var(--sans);
        font-size: 12px;
        font-weight: 500;
        cursor: pointer;
        transition: all 150ms;
        white-space: nowrap;
      }
      .tab-btn.active {
        background: var(--surface-3);
        color: var(--text);
      }
      .tab-btn:hover:not(.active) { color: var(--text); }

      /* ── Main content area ───────────────── */
      #main {
        display: flex;
        height: calc(100vh - 57px);
        overflow: hidden;
      }
      #leftPanel { flex: 1; min-width: 0; }
      #sidebar { width: 300px; flex-shrink: 0; }
      @media (max-width: 900px) {
        #main { grid-template-columns: 1fr; }
        #sidebar { display: none; }
      }

      /* ── Left panel (tabs) ───────────────── */
      #leftPanel {
        overflow-y: auto;
        padding: 16px 20px 80px;
        border-right: 1px solid var(--border);
      }

      /* ── Views ───────────────────────────── */
      .view { display: none; }
      .view.active { display: block; }

      /* ── Search results ──────────────────── */
      #resultsCount {
        font-size: 11px;
        color: var(--text-3);
        font-family: var(--mono);
        margin-bottom: 10px;
        display: flex;
        align-items: center;
        gap: 8px;
      }
      #resultsCount .bar { flex:1; height:1px; background:var(--border); }

      .result-row {
        display: flex;
        gap: 10px;
        align-items: center;
        padding: 8px 10px;
        border-radius: var(--r);
        cursor: pointer;
        transition: background 120ms;
        margin-bottom: 2px;
        position: relative;
      }
      .result-row:hover { background: var(--surface-2); }
      .result-row.playing { background: var(--accent-dim); }
      .result-row img {
        width: 68px; height: 38px;
        object-fit: cover;
        border-radius: var(--r-sm);
        background: var(--surface-3);
        flex-shrink: 0;
      }
      .result-info { flex: 1; min-width: 0; }
      .result-title {
        font-weight: 500;
        font-size: 13px;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      .result-meta {
        color: var(--text-3);
        font-size: 11px;
        display: flex; gap: 6px; align-items: center;
      }
      .result-meta .dur {
        font-family: var(--mono);
        font-size: 10px;
        background: var(--surface-3);
        padding: 1px 5px;
        border-radius: 3px;
      }
      .result-actions {
        display: flex;
        gap: 4px;
        opacity: 0;
        transition: opacity 120ms;
        flex-shrink: 0;
      }
      .result-row:hover .result-actions { opacity: 1; }
      .result-row.playing .result-actions { opacity: 1; }

      /* ── Buttons ─────────────────────────── */
      .btn {
        display: inline-flex; align-items: center; gap: 4px;
        padding: 5px 10px;
        border-radius: var(--r-sm);
        border: none;
        cursor: pointer;
        font-family: var(--sans);
        font-size: 11px;
        font-weight: 500;
        transition: all 120ms;
        white-space: nowrap;
      }
      .btn:disabled { opacity: 0.35; cursor: not-allowed; }
      .btn-accent {
        background: var(--accent);
        color: #0a0a0f;
        font-weight: 700;
      }
      .btn-accent:hover:not(:disabled) { filter: brightness(1.1); }
      .btn-ghost {
        background: rgba(255,255,255,0.06);
        color: var(--text-2);
      }
      .btn-ghost:hover:not(:disabled) {
        background: rgba(255,255,255,0.1);
        color: var(--text);
      }
      .btn-danger {
        background: rgba(255,79,100,0.12);
        color: var(--red);
      }
      .btn-danger:hover:not(:disabled) { background: rgba(255,79,100,0.2); }
      .btn-icon {
        padding: 5px 7px;
        font-size: 13px;
        background: rgba(255,255,255,0.06);
        color: var(--text-2);
        border-radius: var(--r-sm);
        border: none;
        cursor: pointer;
        transition: all 120ms;
      }
      .btn-icon:hover:not(:disabled) {
        background: rgba(255,255,255,0.12);
        color: var(--text);
      }
      .btn-icon:disabled { opacity: 0.35; cursor: not-allowed; }
      .btn-sm { padding: 3px 8px; font-size: 10px; }

      /* ── Dropdown menu ───────────────────── */
      .dropdown-wrap { position: relative; display: inline-block; }
      .dropdown-menu {
        position: absolute; top: calc(100% + 4px); right: 0;
        z-index: 200;
        background: var(--surface-3);
        border: 1px solid var(--border-2);
        border-radius: var(--r);
        min-width: 160px;
        max-height: 200px;
        overflow-y: auto;
        box-shadow: 0 8px 24px rgba(0,0,0,0.5);
        padding: 4px;
      }
      .dropdown-item {
        display: block; width: 100%; text-align: left;
        padding: 7px 10px;
        font-size: 12px; font-family: var(--sans);
        background: none; border: none;
        color: var(--text); cursor: pointer;
        border-radius: var(--r-sm);
        transition: background 100ms;
      }
      .dropdown-item:hover { background: rgba(232,255,90,0.08); color: var(--accent); }

      /* ── Sidebar (right) ─────────────────── */
      #sidebar {
        display: flex;
        flex-direction: column;
        overflow: hidden;
        background: var(--surface);
      }

      /* ── Now Playing (sidebar top) ───────── */
      #nowPlayingCard {
        flex-shrink: 0;
        padding: 16px;
        border-bottom: 1px solid var(--border);
        background: var(--surface);
      }
      #npThumbnail {
        width: 100%;
        height: 150px;
        object-fit: cover;
        border-radius: var(--r);
        background: var(--surface-3);
        margin-bottom: 12px;
        display: block;
      }
      #npLabel {
        font-family: var(--mono);
        font-size: 9px;
        font-weight: 700;
        letter-spacing: 0.1em;
        color: var(--accent);
        text-transform: uppercase;
        margin-bottom: 6px;
        display: flex;
        align-items: center;
        gap: 6px;
      }
      #npLabel .dot {
        width: 6px; height: 6px;
        border-radius: 50%;
        background: var(--accent);
        animation: pulse-dot 1.5s ease-in-out infinite;
        flex-shrink: 0;
      }
      #npLabel .dot.paused { animation: none; opacity: 0.4; }
      #npLabel .dot.idle { background: var(--text-3); animation: none; }
      #npTitle {
        font-size: 14px;
        font-weight: 600;
        line-height: 1.3;
        margin-bottom: 2px;
        display: -webkit-box;
        -webkit-line-clamp: 2;
        line-clamp:2;
        -webkit-box-orient: vertical;
        overflow: hidden;
      }
      #npUploader { color: var(--text-2); font-size: 11px; margin-bottom: 10px; }

      /* Progress */
      .progress-row {
        display: flex;
        align-items: center;
        gap: 8px;
        margin-bottom: 10px;
      }
      .time-label {
        font-family: var(--mono);
        font-size: 10px;
        color: var(--text-3);
        min-width: 30px;
        flex-shrink: 0;
      }
      .time-label.right { text-align: right; }
      input[type="range"] {
        -webkit-appearance: none; appearance: none;
        background: transparent; width: 100%; cursor: pointer;
      }
      input[type="range"]::-webkit-slider-runnable-track {
        height: 3px; border-radius: 2px;
        background: rgba(255,255,255,0.08);
      }
      input[type="range"]::-webkit-slider-thumb {
        -webkit-appearance: none; appearance: none;
        width: 12px; height: 12px;
        border-radius: 50%;
        background: var(--accent);
        margin-top: -4.5px;
        transition: transform 120ms;
      }
      input[type="range"]:hover::-webkit-slider-thumb { transform: scale(1.3); }
      input[type="range"]::-moz-range-track {
        height: 3px; border-radius: 2px;
        background: rgba(255,255,255,0.08);
      }
      input[type="range"]::-moz-range-thumb {
        width: 12px; height: 12px;
        border-radius: 50%;
        background: var(--accent); border: none; cursor: pointer;
      }
      #progressTrack {
        flex: 1;
        height: 3px;
        border-radius: 2px;
        background: rgba(255,255,255,0.08);
        position: relative;
        cursor: pointer;
        display: flex;
        align-items: center;
      }
      #progressFill {
        position: absolute; left: 0; top: 0; bottom: 0;
        background: var(--accent);
        border-radius: 2px;
        pointer-events: none;
        transition: width 200ms linear;
      }
      #progressInput {
        position: absolute; inset: -6px 0;
        opacity: 0; cursor: pointer;
        width: 100%;
      }

      /* Controls */
      .ctrl-row {
        display: flex; gap: 6px; align-items: center;
        margin-bottom: 10px;
      }
      .ctrl-row .spacer { flex: 1; }
      .btn-ctrl {
        width: 32px; height: 32px;
        border-radius: 50%;
        border: none;
        display: flex; align-items: center; justify-content: center;
        font-size: 14px;
        cursor: pointer;
        transition: all 120ms;
        flex-shrink: 0;
      }
      .btn-ctrl.play-pause {
        width: 40px; height: 40px;
        background: var(--accent);
        color: #0a0a0f;
        font-size: 16px;
      }
      .btn-ctrl.play-pause:hover { filter: brightness(1.15); transform: scale(1.05); }
      .btn-ctrl.secondary {
        background: rgba(255,255,255,0.06);
        color: var(--text-2);
      }
      .btn-ctrl.secondary:hover { background: rgba(255,255,255,0.1); color: var(--text); }
      .btn-ctrl:disabled { opacity: 0.3; cursor: not-allowed; }
      .vol-row {
        display: flex; gap: 8px; align-items: center;
        font-size: 11px; color: var(--text-3);
      }
      .vol-row input[type="range"] { flex: 1; }
      #controlError {
        color: var(--red);
        font-size: 11px;
        min-height: 16px;
        margin-top: 2px;
      }

      /* Visualizer (tiny bars in label area) */
      #vizBars {
        display: flex;
        gap: 2px;
        align-items: flex-end;
        height: 14px;
      }
      .vb {
        width: 3px;
        background: var(--accent);
        border-radius: 1px;
        height: 3px;
        transition: height 180ms ease;
        opacity: 0.6;
      }

      /* ── Sidebar tabs ─────────────────────── */
      #sidebarTabs {
        display: flex;
        border-bottom: 1px solid var(--border);
        flex-shrink: 0;
      }
      .stab {
        flex: 1; padding: 9px 0; text-align: center;
        font-size: 11px; font-weight: 500; color: var(--text-3);
        border: none; background: none; cursor: pointer;
        border-bottom: 2px solid transparent;
        transition: all 150ms; font-family: var(--sans);
      }
      .stab.active { color: var(--accent); border-bottom-color: var(--accent); }
      .stab:hover:not(.active) { color: var(--text-2); }

      #sidebarContent { flex: 1; overflow-y: auto; padding: 12px; }

      /* ── Recs / History / Queue items ──── */
      .side-item {
        display: flex; gap: 8px; align-items: center;
        padding: 6px;
        border-radius: var(--r-sm);
        cursor: pointer;
        transition: background 120ms;
        margin-bottom: 2px;
      }
      .side-item:hover { background: var(--surface-2); }
      .side-item.active { background: var(--accent-dim); }
      .side-item img {
        width: 52px; height: 36px;
        object-fit: cover; border-radius: var(--r-sm);
        background: var(--surface-3); flex-shrink: 0;
      }
      .side-item-info { flex: 1; min-width: 0; }
      .side-item-title {
        font-size: 12px; font-weight: 500;
        white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      }
      .side-item-sub { font-size: 10px; color: var(--text-3); }
      .side-item-actions { opacity: 0; transition: opacity 120ms; display: flex; gap: 3px; }
      .side-item:hover .side-item-actions { opacity: 1; }
      .side-item.active .side-item-actions { opacity: 1; }

      /* Queue specific */
      .queue-num {
        font-family: var(--mono); font-size: 10px; color: var(--text-3);
        min-width: 18px; text-align: right; flex-shrink: 0;
      }
      .queue-empty {
        text-align: center; padding: 24px 0;
        color: var(--text-3); font-size: 12px;
        line-height: 1.8;
      }

      /* ── Playlist view ────────────────────── */
      #playlistView .pl-header {
        display: flex; justify-content: space-between; align-items: center;
        margin-bottom: 14px; flex-wrap: wrap; gap: 8px;
      }
      #playlistView h2 {
        font-family: var(--mono);
        font-size: 13px; font-weight: 700;
        color: var(--text-2); text-transform: uppercase; letter-spacing: 0.05em;
      }
      .pl-create-row {
        display: flex; gap: 6px; align-items: center;
      }
      .pl-create-row input {
        padding: 6px 10px; border-radius: var(--r-sm);
        border: 1px solid var(--border); background: var(--surface-2);
        color: var(--text); font-family: var(--sans); font-size: 12px; outline: none;
        width: 160px; transition: border-color 150ms;
      }
      .pl-create-row input:focus { border-color: rgba(232,255,90,0.4); }

      .pl-card {
        background: var(--surface-2);
        border: 1px solid var(--border);
        border-radius: var(--r);
        margin-bottom: 8px;
        overflow: hidden;
        transition: border-color 150ms;
      }
      .pl-card:hover { border-color: var(--border-2); }
      .pl-card-head {
        display: flex; gap: 8px; align-items: center;
        padding: 10px 12px;
      }
      .pl-card-name {
        flex: 1; min-width: 0;
        font-weight: 600; font-size: 13px;
        cursor: pointer; background: none; border: none;
        color: var(--text); padding: 0;
        white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
        text-align: left; font-family: var(--sans);
      }
      .pl-card-name:hover { color: var(--accent); }
      .pl-count { color: var(--text-3); font-size: 11px; white-space: nowrap; }
      .pl-tracks {
        padding: 4px 12px 10px;
        border-top: 1px solid var(--border);
      }
      .pl-track {
        display: flex; gap: 8px; align-items: center;
        padding: 4px 0; font-size: 12px;
      }
      .pl-track-num { color: var(--text-3); font-size: 10px; min-width: 18px; font-family: var(--mono); }
      .pl-track-title { flex: 1; min-width: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
      .pl-track-up { color: var(--text-3); font-size: 10px; }
      .pl-rename-input {
        background: transparent; border: none; border-bottom: 1px solid var(--accent);
        color: var(--text); font-size: 13px; font-weight: 600; outline: none;
        font-family: var(--sans); min-width: 0; flex: 1;
      }

      /* ── Playlist collage cover ──────────── */
      .pl-collage {
        width: 56px; height: 56px; border-radius: var(--r-sm);
        flex-shrink: 0; overflow: hidden;
        display: grid; grid-template-columns: 1fr 1fr;
        grid-template-rows: 1fr 1fr; gap: 1px;
        background: var(--surface-3);
      }
      .pl-collage img {
        width: 100%; height: 100%; object-fit: cover; display: block;
      }
      .pl-collage-ph {
        width: 56px; height: 56px; border-radius: var(--r-sm);
        background: var(--surface-3); flex-shrink: 0;
        display: flex; align-items: center; justify-content: center;
        color: var(--text-3);
      }

      /* ── Badge / tag ─────────────────────── */
      .badge {
        font-family: var(--mono);
        font-size: 9px; font-weight: 700;
        text-transform: uppercase; letter-spacing: 0.06em;
        padding: 2px 6px; border-radius: 3px;
        display: inline-block;
      }
      .badge-accent { background: var(--accent-dim); color: var(--accent); }
      .badge-red { background: rgba(255,79,100,0.12); color: var(--red); }
      .badge-teal { background: rgba(0,212,177,0.12); color: var(--teal); }
      .badge-muted { background: rgba(255,255,255,0.06); color: var(--text-3); }


      /* ── AI Chat ─────────────────────────── */
      #chatToggle {
        position: fixed; bottom: 16px; right: 16px; z-index: 1002;
        width: 46px; height: 46px; border-radius: 50%;
        background: linear-gradient(135deg, var(--teal), #00a896);
        border: none; cursor: pointer; font-size: 18px;
        box-shadow: 0 4px 20px rgba(0,212,177,0.3);
        display: flex; align-items: center; justify-content: center;
        transition: transform 200ms, box-shadow 200ms;
        color: #0a0a0f;
      }
      #chatToggle:hover {
        transform: scale(1.08);
        box-shadow: 0 6px 28px rgba(0,212,177,0.45);
      }
      #chatPanel {
        position: fixed; bottom: 74px; right: 16px; z-index: 1001;
        width: 340px; max-height: 460px;
        background: var(--surface);
        border: 1px solid var(--border-2);
        border-radius: var(--r-lg);
        box-shadow: 0 12px 40px rgba(0,0,0,0.6);
        display: flex; flex-direction: column;
        overflow: hidden;
        transform: scale(0.95) translateY(8px);
        opacity: 0;
        pointer-events: none;
        transition: transform 200ms cubic-bezier(0.34,1.56,0.64,1), opacity 180ms;
      }
      #chatPanel.open {
        transform: scale(1) translateY(0);
        opacity: 1;
        pointer-events: all;
      }
      #chatHead {
        padding: 12px 14px;
        border-bottom: 1px solid var(--border);
        display: flex; align-items: center; gap: 8px;
        background: rgba(0,212,177,0.04);
      }
      #chatHead h3 { margin: 0; font-size: 13px; font-weight: 600; flex: 1; }
      #chatHead .teal { color: var(--teal); font-size: 10px; font-family: var(--mono); }
      #chatMsgs {
        flex: 1; overflow-y: auto;
        padding: 12px; display: flex; flex-direction: column; gap: 8px;
        min-height: 160px; max-height: 280px;
      }
      .msg { max-width: 88%; padding: 8px 11px; border-radius: var(--r); font-size: 12px; line-height: 1.5; }
      .msg.user { align-self: flex-end; background: var(--accent); color: #0a0a0f; border-bottom-right-radius: 3px; font-weight: 500; }
      .msg.ai { align-self: flex-start; background: var(--surface-3); color: var(--text); border-bottom-left-radius: 3px; }
      .msg.ai .sug-btn {
        display: inline-block; margin: 4px 4px 0 0;
        padding: 3px 8px; border-radius: 4px; font-size: 10px;
        background: rgba(0,212,177,0.1); color: var(--teal);
        border: 1px solid rgba(0,212,177,0.2);
        cursor: pointer; transition: all 150ms;
      }
      .msg.ai .sug-btn:hover { background: rgba(0,212,177,0.2); }
      .msg.ai .sug-row { display: flex; align-items: center; gap: 4px; margin: 4px 4px 0 0; }
      .msg.ai .sug-q-btn {
        padding: 3px 6px; border-radius: 4px; font-size: 10px;
        background: rgba(255,255,255,0.06); color: var(--text-3);
        border: 1px solid rgba(255,255,255,0.1);
        cursor: pointer; transition: all 150ms; white-space: nowrap; flex-shrink: 0;
      }
      .msg.ai .sug-q-btn:hover { background: rgba(255,255,255,0.12); color: var(--text); }
      .msg.typing { color: var(--text-3); font-size: 11px; font-style: italic; }
      #chatInputRow {
        padding: 10px 12px; border-top: 1px solid var(--border);
        display: flex; gap: 6px;
      }
      #chatInput {
        flex: 1; padding: 8px 10px; border-radius: var(--r-sm);
        border: 1px solid var(--border); background: var(--surface-3);
        color: var(--text); font-family: var(--sans); font-size: 12px; outline: none;
      }
      #chatInput:focus { border-color: rgba(0,212,177,0.4); }
      #chatSend {
        padding: 8px 12px; border-radius: var(--r-sm);
        background: var(--teal); border: none; color: #0a0a0f;
        cursor: pointer; font-weight: 700; font-size: 12px; font-family: var(--sans);
        transition: filter 150ms;
      }
      #chatSend:hover { filter: brightness(1.1); }
      #chatSend:disabled { opacity: 0.4; cursor: not-allowed; }

      /* ── Loading skeleton ────────────────── */
      .skeleton {
        background: linear-gradient(90deg, var(--surface-2) 25%, var(--surface-3) 50%, var(--surface-2) 75%);
        background-size: 200% 100%;
        animation: shimmer 1.4s ease-in-out infinite;
        border-radius: var(--r-sm);
      }
      @keyframes shimmer { 0%{background-position:200%} 100%{background-position:-200%} }

      .skel-row {
        display: flex; gap: 10px; align-items: center;
        padding: 8px 10px; margin-bottom: 2px;
      }
      .skel-thumb { width: 68px; height: 38px; flex-shrink: 0; }
      .skel-lines { flex: 1; }
      .skel-line { height: 11px; margin-bottom: 5px; }
      .skel-line-w1 { width: 75%; }
      .skel-line-w2 { width: 45%; }

      /* ── Misc helpers ─────────────────────── */
      .error { color: var(--red); font-size: 11px; }
      .muted { color: var(--text-3); }
      .hidden { display: none !important; }
      .flex { display: flex; gap: 6px; align-items: center; }
      .spacer { flex: 1; }



      /* ── EQ presets ───────────────────────── */
      #eqSection {
        margin-top: 8px; padding-top: 8px;
        border-top: 1px solid var(--border);
      }
      #eqSection label {
        font-family: var(--mono); font-size: 9px; font-weight: 700;
        color: var(--text-3); text-transform: uppercase; letter-spacing: .07em;
        display: flex; align-items: center; gap: 6px; margin-bottom: 6px;
      }
      #eqSection label span { color: var(--accent); }
      #eqBtns { display: flex; flex-wrap: wrap; gap: 4px; }
      .eq-btn {
        padding: 3px 9px; border-radius: 999px; font-size: 10px;
        border: 1px solid var(--border); background: none;
        color: var(--text-3); cursor: pointer; font-family: var(--sans);
        transition: all 120ms;
      }
      .eq-btn:hover { border-color: var(--border-2); color: var(--text-2); }
      .eq-btn.active { background: var(--accent-dim); border-color: var(--accent); color: var(--accent); }

      /* ── Queue drag-and-drop ──────────────── */
      .side-item[draggable="true"] { cursor: grab; }
      .side-item[draggable="true"]:active { cursor: grabbing; }
      .side-item.dq-over { outline: 1px dashed var(--accent); background: var(--accent-dim); }
      .side-item.dq-drag { opacity: .35; }
      .drag-handle {
        color: var(--text-3); font-size: 11px; cursor: grab;
        padding: 0 3px; flex-shrink: 0; user-select: none;
      }

      /* ── Playlist cover art ───────────────── */
      .pl-cover {
        width: 40px; height: 40px; border-radius: var(--r-sm);
        object-fit: cover; background: var(--surface-3); flex-shrink: 0;
      }
      .pl-cover-ph {
        width: 40px; height: 40px; border-radius: var(--r-sm);
        background: var(--surface-3); flex-shrink: 0;
        display: flex; align-items: center; justify-content: center;
        font-size: 18px;
      }





      /* ── Sidebar Lyrics ───────────────────────── */
      #sideLyrics {
        padding: 0;
        display: block;
      }
      #lyricsWrap {
        padding: 8px 4px 16px;
        font-size: 13px; line-height: 2;
        color: var(--text-3);
      }
      #lyricsMsg {
        text-align: center; padding: 32px 0;
        color: var(--text-3); font-size: 12px; font-style: italic;
      }
      .lyrics-meta { padding: 4px 8px 12px; border-bottom: 1px solid var(--border); margin-bottom: 8px; }
      .lyrics-title { font-size: 13px; font-weight: 600; color: var(--text); margin-bottom: 2px; }
      .lyrics-artist { font-size: 11px; color: var(--text-3); }
      .lyric-line {
        display: block; padding: 3px 8px;
        border-radius: var(--r-sm);
        transition: color 200ms, background 200ms, transform 200ms;
        cursor: default; font-size: 13px;
        color: var(--text-3);
      }
      .lyric-line.lyr-active {
        color: var(--text);
        font-weight: 600;
        background: var(--accent-dim);
        transform: translateX(4px);
      }
      .lyric-line.lyr-near {
        color: var(--text-2);
      }
      .plain-lyrics {
        white-space: pre-wrap; font-size: 12px; line-height: 1.8;
        padding: 0 8px; color: var(--text-2);
      }
      /* ── Recently played strip ──────────────── */
      #recentStrip {
        margin-bottom: 16px;
        display: none; /* hidden by default; shown when search is empty */
      }
      #recentStrip.visible { display: block; }
      #recentStrip h3 {
        font-family: var(--mono); font-size: 10px; font-weight: 700;
        letter-spacing: 0.08em; text-transform: uppercase;
        color: var(--text-3); margin-bottom: 10px;
      }
      #recentCards {
        display: flex; gap: 8px; overflow-x: auto; padding-bottom: 4px;
      }
      #recentCards::-webkit-scrollbar { height: 3px; }
      .recent-card {
        flex-shrink: 0; width: 150px; cursor: pointer;
        border-radius: var(--r); overflow: hidden;
        background: var(--surface-2); border: 1px solid var(--border);
        transition: border-color 150ms, transform 120ms, box-shadow 120ms;
      }
      .recent-card:hover { border-color: var(--accent); transform: translateY(-3px); box-shadow: 0 8px 20px rgba(0,0,0,0.4); }
      .recent-card img {
        width: 150px; height: 84px; object-fit: cover; display: block;
        background: var(--surface-3);
      }
      .recent-card-info { padding: 8px 10px 10px; }
      .recent-card-title {
        font-size: 12px; font-weight: 600;
        white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
        line-height: 1.3;
      }
      .recent-card-up { font-size: 10px; color: var(--text-3); margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

      /* ── Search history dropdown ────────────── */
      #searchHistoryDrop {
        position: absolute; top: calc(100% + 6px); left: 0; right: 0;
        background: var(--surface-3); border: 1px solid var(--border-2);
        border-radius: var(--r); z-index: 300;
        box-shadow: 0 8px 24px rgba(0,0,0,0.5);
        display: none;
      }
      #searchHistoryDrop.visible { display: block; }
      .sh-item {
        display: flex; align-items: center; gap: 8px;
        padding: 8px 12px; cursor: pointer; font-size: 12px;
        transition: background 100ms;
      }
      .sh-item:hover { background: var(--surface-2); }
      .sh-item-icon { color: var(--text-3); font-size: 11px; }
      .sh-item-text { flex: 1; }
      .sh-item-del { color: var(--text-3); font-size: 11px; padding: 2px 4px; border: none; background: none; cursor: pointer; }
      .sh-item-del:hover { color: var(--red); }

      /* ── Queue drag-and-drop ─────────────────── */
      .side-item.dragging { opacity: 0.45; }
      .side-item.drag-over { border-top: 2px solid var(--accent); }

      /* ── Keyboard shortcut hint ─────────────── */
      #kbHint {
        position: fixed; bottom: 8px; left: 50%; transform: translateX(-50%);
        font-size: 10px; color: var(--text-3); font-family: var(--mono);
        pointer-events: none; opacity: 0;
        transition: opacity 400ms;
        background: var(--surface-3); padding: 3px 10px; border-radius: 999px;
        border: 1px solid var(--border);
      }
      #kbHint.visible { opacity: 1; }


      /* ── Toast notifications (floating, no layout impact) ── */
      #toastContainer {
        position: fixed;
        bottom: 24px;
        left: 50%;
        transform: translateX(-50%);
        z-index: 9999;
        display: flex;
        flex-direction: column-reverse;
        align-items: center;
        gap: 8px;
        pointer-events: none;
      }
      .toast {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 9px 16px;
        border-radius: 999px;
        font-size: 12px;
        font-family: var(--sans);
        font-weight: 500;
        color: var(--text);
        background: var(--surface-3);
        border: 1px solid var(--border-2);
        box-shadow: 0 8px 32px rgba(0,0,0,0.5);
        pointer-events: auto;
        white-space: nowrap;
        animation: toast-rise 300ms cubic-bezier(0.34,1.56,0.64,1) forwards;
      }
      .toast.success { border-color: rgba(100,220,130,0.35); color: #6ddc82; }
      .toast.error   { border-color: rgba(255,79,100,0.35);  color: var(--red); }
      .toast.info    { border-color: var(--border-2); color: var(--text-2); }
      .toast-icon    { font-size: 13px; flex-shrink: 0; }
      .toast.fade-out {
        animation: toast-fade 500ms ease forwards;
      }
      @keyframes toast-rise {
        from { opacity: 0; transform: translateY(12px) scale(0.92); }
        to   { opacity: 1; transform: translateY(0)    scale(1);    }
      }
      @keyframes toast-fade {
        0%   { opacity: 1; transform: translateY(0)    scale(1);    }
        100% { opacity: 0; transform: translateY(-8px) scale(0.95); }
      }
    </style>
  </head>
  <body>
    <!-- Toast container -->
    <div id="toastContainer"></div>

    <!-- Keyboard shortcut flash -->
    <div id="kbHint"></div>

    <div id="app">
      <!-- TOP BAR -->
      <div id="topbar">
        <div id="logo">RESONANCE</div>
        <div id="searchBar">
          <input id="searchInput" type="text" placeholder="Search songs, artists…" autocomplete="off" />
          <button id="searchClear"><i class="ph ph-x"></i></button>
          <div id="searchHistoryDrop"></div>
          <div id="searchSpinner"><span class="spinner-sm"></span></div>
        </div>
        <div id="topBarRight">
          <div id="tabNav">
            <button class="tab-btn active" data-tab="searchView">Search</button>
            <button class="tab-btn" data-tab="playlistView">Playlists</button>
          </div>
        </div>
      </div>

      <!-- MAIN GRID -->
      <div id="main">
        <!-- LEFT: tab views -->
        <div id="leftPanel">

          <!-- SEARCH VIEW -->
          <div id="searchView" class="view active">
            <!-- Recently played — visible only when search is empty -->
            <div id="recentStrip" style="display:none">
              <h3>Recently Played</h3>
              <div id="recentCards"></div>
            </div>
            <div id="resultsCount"></div>
            <div id="results"></div>
          </div>

          <!-- PLAYLIST VIEW -->
          <div id="playlistView" class="view">
            <div class="pl-header">
              <h2>Playlists</h2>
              <div class="pl-create-row">
                <input id="newPlName" type="text" placeholder="New playlist name…" />
                <button class="btn btn-accent" id="createPlBtn">+ Create</button>
              </div>
            </div>
            <div id="playlistList"></div>
          </div>

        </div>

        <!-- RIGHT SIDEBAR -->
        <div id="sidebar">
          <!-- Now Playing Card -->
          <div id="nowPlayingCard">
            <img id="npThumbnail" src="" alt="" />
            <div id="npLabel">
              <span id="npDot" class="dot idle"></span>
              <span id="npStatusText">IDLE</span>
              <span style="flex:1"></span>
              <div id="vizBars"></div>
            </div>
            <div id="npTitle">Nothing playing</div>
            <div id="npUploader"></div>

            <div class="progress-row">
              <span class="time-label" id="curTime">0:00</span>
              <div id="progressTrack">
                <div id="progressFill" style="width:0%"></div>
                <input type="range" id="progress" min="0" max="0" value="0" step="1" id="progressInput" />
              </div>
              <span class="time-label right" id="totalTime">—</span>
            </div>

            <div class="ctrl-row">
              <button class="btn-ctrl secondary" id="prevBtn" title="Previous"><i class="ph ph-skip-back"></i></button>
              <button class="btn-ctrl secondary" id="stopBtn" title="Stop"><i class="ph ph-stop"></i></button>
              <button class="btn-ctrl play-pause" id="playPauseBtn" title="Play / Pause"><i class="ph ph-play"></i></button>
              <button class="btn-ctrl secondary" id="nextBtn" title="Next"><i class="ph ph-skip-forward"></i></button>
            </div>
            <div class="vol-row">
              <i class="ph ph-speaker-high" style="color:var(--text-3);font-size:14px"></i>
              <input type="range" id="volume" min="0" max="100" value="70" />
              <span id="volNum" style="font-family:var(--mono);font-size:10px;color:var(--text-3);min-width:24px;text-align:right;">70</span>
            </div>
            <!-- EQ presets -->
            <div id="eqSection">
              <label>EQ Preset <span id="eqLabel">Flat</span></label>
              <div id="eqBtns"></div>
            </div>
            <div id="controlError"></div>
          </div>

          <!-- Sidebar tabs -->
          <div id="sidebarTabs">
            <button class="stab active" data-stab="recs">Related</button>
            <button class="stab" data-stab="lyrics" id="lyricsTab">Lyrics</button>
            <button class="stab" data-stab="queue">Queue</button>
            <button class="stab" data-stab="history">History</button>
          </div>
          <div id="sidebarContent">
            <div id="sideRecs"></div>
            <div id="sideLyrics" class="hidden"><div id="lyricsWrap"><div id="lyricsMsg">Play a song to see lyrics.</div></div></div>
            <div id="sideQueue" class="hidden"></div>
            <div id="sideHistory" class="hidden"></div>
          </div>
        </div>
      </div>
    </div>


    <!-- AI CHAT -->
    <button id="chatToggle" title="Ask Resonance AI"><i class="ph ph-sparkle"></i></button>
    <div id="chatPanel">
      <div id="chatHead">
        <i class="ph ph-music-notes" style="font-size:16px"></i>
        <h3>Resonance AI</h3>
        <span class="teal">Gemini</span>
      </div>
      <div id="chatMsgs">
        <div class="msg ai">Hi! Tell me what mood you're in and I'll find the perfect music.</div>
      </div>
      <div id="chatInputRow">
        <input id="chatInput" type="text" placeholder="e.g. chill lo-fi for studying" />
        <button id="chatSend">Send</button>
      </div>
    </div>

    <script>
    /* =====================================================================
       RESONANCE — Unified Frontend Script
       Features: Lyrics (lrclib + lyrics.ovh), Keyboard Shortcuts,
       Recently Played Strip, Toast Notifications, Queue Reordering,
       Search History, Playlist Cover Art, Equalizer Presets
    ===================================================================== */

    /* ── Utilities ─────────────────────────────── */
    const esc = t => String(t??'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[m]);
    const fmt = s => { s=Math.max(0,s|0); return `${(s/60|0)}:${String(s%60).padStart(2,'0')}`; };
    const el = id => document.getElementById(id);

    async function api(path, opts={}) {
      const r = await fetch(path, { ...opts, headers: {'Content-Type':'application/json', ...(opts.headers||{})} });
      const d = await r.json();
      if (!d.ok) throw new Error(d.error || 'Request failed');
      return d;
    }

    /* ── State ────────────────────────────────── */
    let results = [], page = 0;
    let lastStatus = 'idle';
    let lastPos = 0, lastDur = 0, lastUpdateTs = Date.now();
    let isSeeking = false;
    let playingId = null, pendingId = null;
    let currentTitle = '', currentUploader = '', currentThumb = '';
    let playlists = [];
    let expandedPl = null;

    let generalQueue = [], gqIdx = 0, gqActive = false;
    let allRecs = [], recsIdx = 0;
    const RECS_BATCH = 10;
    let pollInterval = null;

    /* ── localStorage helpers ──────────────────── */
    const lsGet = (k,d=null) => { try{ const v=localStorage.getItem(k); return v===null?d:JSON.parse(v); }catch{return d;} };
    const lsSet = (k,v) => { try{ localStorage.setItem(k,JSON.stringify(v)); }catch{} };

    /* ════════════════════════════════════════════
       FEATURE 1: TOAST NOTIFICATIONS
    ════════════════════════════════════════════ */
    function toast(msg, type='info', duration=2400) {
      const shelf = el('toastContainer');
      // Limit to 3 visible toasts — remove oldest if exceeded
      const existing = shelf.querySelectorAll('.toast:not(.fade-out)');
      if (existing.length >= 3) existing[existing.length - 1].remove();

      const t = document.createElement('div');
      t.className = `toast ${type}`;
      const icons = { success:'<i class="ph ph-check"></i>', info:'<i class="ph ph-music-note"></i>', error:'<i class="ph ph-warning"></i>', warning:'<i class="ph ph-warning"></i>' };
      t.innerHTML = `<span class="toast-icon">${icons[type]||''}</span><span>${esc(msg)}</span>`;
      shelf.prepend(t);

      // Dismiss on click
      t.addEventListener('click', () => dismiss(t));

      function dismiss(el) {
        if (el._dismissing) return;
        el._dismissing = true;
        el.classList.add('fade-out');
        setTimeout(() => { if (el.parentNode) el.remove(); }, 520);
      }
      setTimeout(() => dismiss(t), duration);
    }

    /* ════════════════════════════════════════════
       FEATURE 2: SEARCH HISTORY
    ════════════════════════════════════════════ */
    let searchHistory = lsGet('rq_search_history', []);

    function shAdd(q) {
      searchHistory = [q, ...searchHistory.filter(x=>x!==q)].slice(0, 12);
      lsSet('rq_search_history', searchHistory);
    }
    function shRemove(q) {
      searchHistory = searchHistory.filter(x=>x!==q);
      lsSet('rq_search_history', searchHistory);
      renderShDrop(el('searchInput').value.trim());
    }
    function renderShDrop(filter='') {
      const drop = el('searchHistoryDrop');
      const items = filter
        ? searchHistory.filter(s=>s.toLowerCase().includes(filter.toLowerCase()))
        : searchHistory;
      if (!items.length) { drop.classList.remove('visible'); drop.innerHTML=''; return; }
      drop.innerHTML = '';
      const header = document.createElement('div');
      header.style.cssText = 'display:flex;justify-content:space-between;align-items:center;padding:6px 12px 2px;';
      header.innerHTML = '<span style="font-size:10px;color:var(--text-3);font-family:var(--mono);text-transform:uppercase;letter-spacing:.06em">Recent</span>';
      const clearAll = document.createElement('button');
      clearAll.style.cssText = 'font-size:10px;background:none;border:none;color:var(--text-3);cursor:pointer;';
      clearAll.textContent = 'Clear all';
      clearAll.addEventListener('click', e=>{
        e.stopPropagation();
        searchHistory = []; lsSet('rq_search_history', []);
        drop.classList.remove('visible'); drop.innerHTML='';
      });
      header.appendChild(clearAll);
      drop.appendChild(header);
      items.slice(0, 8).forEach(q => {
        const row = document.createElement('div'); row.className='sh-item';
        const icon = document.createElement('i'); icon.className='ph ph-clock sh-item-icon';
        const text = document.createElement('span'); text.className='sh-item-text'; text.textContent=q;
        const del = document.createElement('button'); del.className='sh-item-del'; del.title='Remove'; del.innerHTML='<i class="ph ph-x"></i>';
        del.addEventListener('click', e=>{ e.stopPropagation(); shRemove(q); });
        row.append(icon, text, del);
        row.addEventListener('click', ()=>{
          el('searchInput').value = q;
          drop.classList.remove('visible');
          clearTimeout(searchDebounce);
          doSearch();
        });
        drop.appendChild(row);
      });
      drop.classList.add('visible');
    }
    el('searchInput').addEventListener('focus', ()=>{
      if (!el('searchInput').value.trim() && searchHistory.length) renderShDrop('');
    });
    document.addEventListener('click', e=>{
      if (!el('searchBar').contains(e.target)) el('searchHistoryDrop').classList.remove('visible');
    });

    /* ════════════════════════════════════════════
       FEATURE 3: RECENTLY PLAYED STRIP
    ════════════════════════════════════════════ */
    let recentlyPlayed = lsGet('rq_recent', []);

    function rpAdd(item) {
      if (!item?.id) return;
      recentlyPlayed = [
        {id:item.id,title:item.title||'',uploader:item.uploader||'',thumbnail:item.thumbnail||''},
        ...recentlyPlayed.filter(x=>x.id!==item.id)

      switch(e.key) {
        case ' ':

          flashKbHint(lastStatus==='playing' ? '⏸ Pause' : '▶ Play');
          break;
        case 'ArrowRight':
          e.preventDefault();
          { const p = Math.min(lastPos+10, lastDur||9999);
            api('/api/seek',{method:'POST',body:JSON.stringify({position:p})}).catch(()=>{});
            lastPos=p; lastUpdateTs=Date.now(); flashKbHint('+10s'); }
          break;
        case 'ArrowLeft':
          e.preventDefault();
          { const p = Math.max(lastPos-10, 0);
            api('/api/seek',{method:'POST',body:JSON.stringify({position:p})}).catch(()=>{});
            lastPos=p; lastUpdateTs=Date.now(); flashKbHint('-10s'); }
          break;
        case 'ArrowUp':
          e.preventDefault();
          { const v=Math.min(100, Number(el('volume').value)+5); el('volume').value=v; el('volNum').textContent=v;
            api('/api/volume',{method:'POST',body:JSON.stringify({level:v})}).catch(()=>{});

          break;
        case 'ArrowDown':
          e.preventDefault();
          { const v=Math.max(0, Number(el('volume').value)-5); el('volume').value=v; el('volNum').textContent=v;
            api('/api/volume',{method:'POST',body:JSON.stringify({level:v})}).catch(()=>{});

        case 'p': case 'P': el('prevBtn').click(); flashKbHint('Prev'); break;
        case 's': case 'S': el('stopBtn').click(); flashKbHint('Stop'); break;
        case 'l': case 'L': el('lyricsTab').click(); flashKbHint('Lyrics'); break;

    /* ════════════════════════════════════════════
       FEATURE 6: LYRICS PANEL (lrclib + lyrics.ovh)
    ════════════════════════════════════════════ */
    // ── Lyrics state ─────────────────────────────────────────────
    let syncedLines = [], lastLyrIdx = -1;
    let lyricsLoadedForId = null;   // track id lyrics were fetched for
    let lyricsLoadedAtPos = 0;      // song position when lyrics finished loading

    function cleanLyricsText(t) {
      return t.replace(/\(official.*?\)/gi,'').replace(/\[.*?\]/g,'')
              .replace(/official\s*(video|audio|lyric|music video)/gi,'')
              .replace(/\s+/g,' ').trim();
    }

    // Called whenever user clicks the Lyrics tab OR L key
    function openLyrics() {
      document.querySelectorAll('.stab').forEach(b=>b.classList.remove('active'));
      const lt = el('lyricsTab'); if(lt) lt.classList.add('active');
      el('sideRecs').classList.add('hidden');
      el('sideLyrics').classList.remove('hidden');
      el('sideQueue').classList.add('hidden');
      el('sideHistory').classList.add('hidden');

      // Only re-fetch if song changed
      if (playingId && playingId !== lyricsLoadedForId) {
        loadLyrics(currentTitle, currentUploader, playingId);
      }
    }

    async function loadLyrics(title, artist, trackId) {
      lyricsLoadedForId = trackId;
      syncedLines = []; lastLyrIdx = -1;
      const wrap = el('lyricsWrap');
      wrap.innerHTML = '<div id="lyricsMsg">Searching for lyrics…</div>';

      const ct = cleanLyricsText(title);
      const ca = artist.replace(/\s*-\s*Topic$/, '').trim();

      // Try lrclib first (has synced lyrics)
      try {
        const r = await fetch(`https://lrclib.net/api/search?q=${encodeURIComponent(ct)}&artist_name=${encodeURIComponent(ca)}`);
        if (r.ok) {
          const data = await r.json();
          if (Array.isArray(data) && data.length) {
            const track = data.find(t=>t.syncedLyrics) || data[0];
            if (track.syncedLyrics) {
              syncedLines = track.syncedLyrics.split('\n').map(l=>{
                const m = l.match(/^\[(\d+):(\d+(?:\.\d+)?)\](.*)/);
                return m ? {t: parseInt(m[1])*60 + parseFloat(m[2]), text: m[3].trim()} : null;
              }).filter(Boolean);
              if (syncedLines.length) {
                // Record the song position at load-complete time for sync offset
                lyricsLoadedAtPos = lastPos + (Date.now()-lastUpdateTs)/1000;
                renderSyncedLyrics(ct, ca);
                return;
              }
            }
            if (track.plainLyrics) {
              renderPlainLyrics(ct, ca, track.plainLyrics);
              return;
            }
          }
        }
      } catch {}

      // Try server proxy (lrclib + lyrics.ovh)
      try {
        const r = await fetch(`/api/lyrics?artist=${encodeURIComponent(ca)}&title=${encodeURIComponent(ct)}`);
        if (r.ok) {
          const d = await r.json();
          if (d.ok && d.lyrics) { renderPlainLyrics(ct, ca, d.lyrics); return; }
        }
      } catch {}

      // Final fallback: lyrics.ovh
      try {
        const r2 = await fetch(`https://api.lyrics.ovh/v1/${encodeURIComponent(ca)}/${encodeURIComponent(ct)}`);
        if (r2.ok) {
          const d2 = await r2.json();
          if (d2.lyrics) { renderPlainLyrics(ct, ca, d2.lyrics); return; }
        }
      } catch {}

      wrap.innerHTML = '<div id="lyricsMsg">No lyrics found for this track.</div>';
    }

    function renderPlainLyrics(title, artist, text) {
      const wrap = el('lyricsWrap');
      wrap.innerHTML = `
        <div class="lyrics-meta">
          <div class="lyrics-title">${esc(title)}</div>
          <div class="lyrics-artist">${esc(artist)}</div>
        </div>
        <div class="plain-lyrics">${esc(text)}</div>`;
    }

    function renderSyncedLyrics(title, artist) {
      const wrap = el('lyricsWrap');
      wrap.innerHTML = `<div class="lyrics-meta"><div class="lyrics-title">${esc(title)}</div><div class="lyrics-artist">${esc(artist)}</div></div>`;
      const linesWrap = document.createElement('div'); linesWrap.id='lyricsLinesWrap';
      syncedLines.forEach((l, i)=>{
        if (!l.text) return; // skip blank timestamp lines
        const d = document.createElement('div'); d.className='lyric-line'; d.dataset.li=i;
        d.textContent = l.text;
        linesWrap.appendChild(d);
      });
      wrap.appendChild(linesWrap);
      // Immediately highlight at current position
      const pos = lastPos + (Date.now()-lastUpdateTs)/1000;
      updateLyricHighlight(pos, true);
    }

    function updateLyricHighlight(pos, immediate=false) {
      if (!syncedLines.length) return;
      const wrap = el('lyricsLinesWrap'); if (!wrap) return;

      // Find the line whose timestamp <= current position
      let idx = -1;
      for (let i=0; i<syncedLines.length; i++) {
        if (syncedLines[i].t <= pos) idx = i;
        else break;
      }
      if (idx < 0) idx = 0;
      if (idx === lastLyrIdx) return;
      lastLyrIdx = idx;

      const allLines = wrap.querySelectorAll('.lyric-line');
      // Map visible lyric-line index to syncedLines index
      // (we skipped blank lines when rendering, so use data-li)
      allLines.forEach(el2=>{
        const li = parseInt(el2.dataset.li);
        el2.classList.toggle('lyr-active', li===idx);
        el2.classList.toggle('lyr-near', li===idx-1||li===idx+1);
      });
      const active = wrap.querySelector('.lyr-active');
      if (active) active.scrollIntoView({block:'center', behavior: immediate?'instant':'smooth'});
    }

    // Sync loop — runs every 250ms; uses interpolated position to stay smooth
    setInterval(()=>{
      if (!syncedLines.length) return;
      const proj = lastPos + (Date.now()-lastUpdateTs)/1000;
      updateLyricHighlight(proj);
    }, 250);

    // When a song starts playing, invalidate cached lyrics if track changed
    function onTrackChanged(id) {
      if (id !== lyricsLoadedForId) {
        lyricsLoadedForId = null;
        syncedLines = []; lastLyrIdx = -1;
        // If lyrics tab is visible, auto-reload for new track
        const lt = el('lyricsTab');
        if (lt && lt.classList.contains('active')) {
          loadLyrics(currentTitle, currentUploader, id);
        }
      }
    }

    /* ── Search ───────────────────────────────── */
    let searchDebounce = null;
    let searchSeq = 0;

    el('searchInput').addEventListener('input', () => {
      clearTimeout(searchDebounce);
      const q = el('searchInput').value.trim();
      el('searchHistoryDrop').classList.remove('visible');
      if (!q) {
        clearResults();

        if (searchHistory.length) renderShDrop('');

      }
      el('recentStrip').style.display = 'none';
      renderShDrop(q);

      searchDebounce = setTimeout(doSearch, 380);

    el('searchInput').addEventListener('keydown', e => {
      if (e.key==='Enter') { clearTimeout(searchDebounce); el('searchHistoryDrop').classList.remove('visible'); doSearch(); }
      if (e.key==='Escape') { el('searchHistoryDrop').classList.remove('visible'); }

    function clearResults() {
      results=[]; page=0;
      resultsEl.innerHTML='';
      el('resultsCount').innerHTML='';
    }
    function showSkeleton() {
      resultsEl.innerHTML = Array(6).fill(0).map(()=>`
        <div class="skel-row">
          <div class="skeleton skel-thumb"></div>
          <div class="skel-lines">
            <div class="skeleton skel-line skel-line-w1"></div>
            <div class="skeleton skel-line skel-line-w2"></div>
          </div>

    async function doSearch() {
      const q = el('searchInput').value.trim();
      if (!q) return;
      const seq = ++searchSeq;
      shAdd(q);
      el('searchHistoryDrop').classList.remove('visible');
      el('recentStrip').style.display = 'none';
      el('searchSpinner').style.display = 'block';
      el('searchClear').style.display = 'none';
      try {
        const d = await api(`/api/search?q=${encodeURIComponent(q)}&limit=30`);
        if (seq!==searchSeq) return;
        results = d.results||[]; page=0;
        renderResults();
      } catch(err) {
        if (seq!==searchSeq) return;
        resultsEl.innerHTML = `<div class="error" style="padding:12px">${esc(err.message)}</div>`;
      } finally {
        if (seq===searchSeq) { el('searchSpinner').style.display='none'; el('searchClear').style.display=''; }
      }
    }
    function renderResults() {
      el('resultsCount').innerHTML = results.length
        ? `<span style="font-family:var(--mono);font-size:10px;color:var(--text-3)">${results.length} results</span><span class="bar"></span>`
        : '';
      resultsEl.innerHTML = '';
      const frag = document.createDocumentFragment();
      results.forEach(item => frag.appendChild(buildResultRow(item)));
      resultsEl.appendChild(frag);

    function buildResultRow(item) {
      const row = document.createElement('div');
      row.className = 'result-row'+(playingId===item.id?' playing':'');
      row.dataset.id = item.id;
      const img = document.createElement('img'); img.loading='lazy'; img.src=item.thumbnail||''; img.alt=''; img.width=68; img.height=38;
      const info = document.createElement('div'); info.className='result-info';
      const t = document.createElement('div'); t.className='result-title'; t.textContent=item.title||'Untitled';
      const m = document.createElement('div'); m.className='result-meta';
      m.innerHTML = `<span>${esc(item.uploader||'')}</span>${item.duration?`<span class="dur">${esc(item.duration)}</span>`:''}`;
      info.append(t,m);
      const actions = document.createElement('div'); actions.className='result-actions';
      const playBtn = document.createElement('button'); playBtn.className='btn-icon'; playBtn.title='Play';

      const qBtn = document.createElement('button'); qBtn.className='btn-icon btn-sm'; qBtn.title='Add to queue'; qBtn.textContent='+Q';
      qBtn.addEventListener('click', e=>{

      row.addEventListener('click', ()=>handlePlay(item.id, item));

    /* ── Playlist dropdown ────────────────────── */
    function buildPlaylistDropdown(item) {
      const wrap = document.createElement('div'); wrap.className='dropdown-wrap';
      const btn = document.createElement('button'); btn.className='btn-icon btn-sm'; btn.textContent='+'; btn.title='Add to playlist';
      btn.addEventListener('click', e=>{

        if (ex) { ex.remove(); return; }
        document.querySelectorAll('.dropdown-menu').forEach(m=>m.remove());

        playlists.forEach(pl=>{
          const mi = document.createElement('button'); mi.className='dropdown-item'; mi.textContent=pl.name;
          mi.addEventListener('click', async ev=>{

              await api(`/api/playlists/${pl.id}/tracks`,{method:'POST',body:JSON.stringify({id:item.id,title:item.title,uploader:item.uploader,duration:item.duration,thumbnail:item.thumbnail})});

              toast(`Added to "${pl.name}"`, 'success');
              await loadPlaylists();
            } catch(err){ mi.textContent=err.message; }
          });
          menu.appendChild(mi);
        });
        wrap.appendChild(menu);
        setTimeout(()=>{ document.addEventListener('click',()=>menu.remove(),{once:true}); }, 0);

      wrap.appendChild(btn); return wrap;

    /* ── Play handling ────────────────────────── */
    async function handlePlay(id, itemMeta) {
      if (pendingId) return;
      controlError.textContent='';
      pendingId = id;
      if (itemMeta) {
        npTitle.textContent=itemMeta.title||'Loading…';
        npUploader.textContent=itemMeta.uploader||'';
        npThumbnail.src=itemMeta.thumbnail||'';
        currentTitle=itemMeta.title||'';
        currentUploader=itemMeta.uploader||'';
        currentThumb=itemMeta.thumbnail||'';
      }
      npStatusText.textContent='LOADING'; npDot.className='dot';
      const existing = generalQueue.findIndex(t=>t.id===id);
      if (existing===-1 && itemMeta) {
        generalQueue.push({id:itemMeta.id,title:itemMeta.title,uploader:itemMeta.uploader||'',duration:itemMeta.duration,thumbnail:itemMeta.thumbnail});
        gqIdx=generalQueue.length-1;
      } else if (existing!==-1) { gqIdx=existing; }
      gqActive=true; renderQueuePanel();
      try {
        const resp = await api('/api/play',{method:'POST',body:JSON.stringify({id})});
        playingId=id;
        if (resp.result?.meta) {
          const meta = resp.result.meta;
          currentTitle=meta.title||''; currentUploader=meta.uploader||''; currentThumb=meta.thumbnail||'';
          npTitle.textContent=currentTitle; npUploader.textContent=currentUploader; npThumbnail.src=currentThumb;
          // Update queue entry with real meta
          if (generalQueue[gqIdx]) {
            generalQueue[gqIdx]={id:meta.id||id,title:meta.title||itemMeta?.title||'',uploader:meta.uploader||'',duration:meta.duration,thumbnail:meta.thumbnail||''};
          }
          rpAdd(meta);
          renderRecentStrip();
          renderQueuePanel();
          toast(currentTitle, 'success');
        }
        setAdaptivePoll('playing');
        if (currentTitle) { loadRecs(currentTitle, currentUploader); }
        if (el('lyricsTab')?.classList.contains('active') && currentTitle) loadLyrics(currentTitle, currentUploader, playingId);
        loadHistory();
      } catch(err) {
        controlError.textContent=err.message; npStatusText.textContent='ERROR';
        toast(err.message, 'error');
      } finally {
        pendingId=null;
        if (results.length) renderResults();
      }
    }

    async function internalPlay(id) {
      pendingId=id;
      try {
        await api('/api/play',{method:'POST',body:JSON.stringify({id})});
        playingId=id;
        await refreshStatus();
        if (currentTitle) { loadRecs(currentTitle, currentUploader); if(el('lyricsTab')?.classList.contains('active')) loadLyrics(currentTitle, currentUploader, playingId); }
        loadHistory();
      } catch(err){ controlError.textContent=err.message; }
      finally { pendingId=null; }
    }

      try {
        await api('/api/stop',{method:'POST'}); await waitForIdle(4000);
        gqIdx++; renderQueuePanel();
        const next=generalQueue[gqIdx]; if(next){ gqActive=true; await internalPlay(next.id); }
      } catch(err){ controlError.textContent=err.message; }
    });
    el('volume').addEventListener('input', e=>{
      el('volNum').textContent=e.target.value;
      api('/api/volume',{method:'POST',body:JSON.stringify({level:e.target.value})}).catch(()=>{});
    });
    function showCtrlMsg(msg){ controlError.textContent=msg; setTimeout(()=>controlError.textContent='',2000); }
    async function waitForIdle(timeout=4000,interval=120){
      const t=Date.now();
      while(Date.now()-t<timeout){
        try{ const d=await api('/api/status'); if((d.result?.status||'idle')==='idle') return true; }catch{}
        await new Promise(r=>setTimeout(r,interval));
      }
      return false;
    }

    /* ── Progress ─────────────────────────────── */
    progressInput.addEventListener('mousedown',()=>isSeeking=true);
    progressInput.addEventListener('touchstart',()=>isSeeking=true);
    progressInput.addEventListener('input',()=>{ curTimeEl.textContent=fmt(Number(progressInput.value)); });
    progressInput.addEventListener('change', async ()=>{
      isSeeking=false;
      try { await api('/api/seek',{method:'POST',body:JSON.stringify({position:Number(progressInput.value)})}); }
      catch(err){ controlError.textContent=err.message; }
    });
    function setProgress(pos,dur){
      if(!dur){ progressFill.style.width='0%'; progressInput.max=0; progressInput.value=0; progressInput.disabled=true; curTimeEl.textContent=fmt(pos); totalTimeEl.textContent='—'; return; }
      progressInput.disabled=false; progressInput.max=Math.floor(dur);
      if(!isSeeking) progressInput.value=Math.floor(Math.min(pos,dur));
      progressFill.style.width=Math.min((pos/dur)*100,100).toFixed(2)+'%';
      curTimeEl.textContent=fmt(pos); totalTimeEl.textContent=fmt(dur);
    }

    /* ── Visualizer ───────────────────────────── */
    const vizEl = el('vizBars');
    for(let i=0;i<8;i++){ const b=document.createElement('div'); b.className='vb'; vizEl.appendChild(b); }
    const vBars=[...vizEl.querySelectorAll('.vb')];
    let vizFrame=0;
    function animViz(playing){ if(!playing){ vBars.forEach(b=>b.style.height='3px'); return; } vBars.forEach(b=>b.style.height=(3+Math.random()*11)+'px'); }

    /* ── rAF tick ─────────────────────────────── */
    let lastTickPos=-1, lastTickStatus='';
    function tick(now){
      requestAnimationFrame(tick);
      const elapsed=(Date.now()-lastUpdateTs)/1000;
      const proj=lastStatus==='playing'&&!isSeeking?lastPos+elapsed:lastPos;
      if(Math.abs(proj-lastTickPos)>0.1||lastStatus!==lastTickStatus){ setProgress(proj,lastDur); lastTickPos=proj; lastTickStatus=lastStatus; }
      if(now-vizFrame>120){ animViz(lastStatus==='playing'); vizFrame=now; }
    }
    requestAnimationFrame(tick);

    /* ── Status polling ───────────────────────── */
    function setAdaptivePoll(status){
      clearInterval(pollInterval);
      const interval=status==='playing'?1200:status==='paused'?3000:5000;
      pollInterval=setInterval(refreshStatus,interval);
    }
    async function refreshStatus(){
      try{ const d=await api('/api/status'); updatePlayerUI(d.result||{}); }catch{}
    }
    function updatePlayerUI(s){
      const st=s.status||'idle';
      const prevStatus=lastStatus;
      lastStatus=st; lastPos=s.position??0; lastDur=s.durationSeconds||s.meta?.durationSeconds||0; lastUpdateTs=Date.now();
      if(st!==prevStatus){
        setAdaptivePoll(st);
        playPauseBtn.innerHTML=st==='playing'?'<i class="ph ph-pause"></i>':'<i class="ph ph-play"></i>';
        npDot.className='dot'+(st==='playing'?'':st==='paused'?' paused':' idle');
        npStatusText.textContent=st.toUpperCase();
      }
      if(s.meta?.id) playingId=s.meta.id;
      if(s.meta?.title&&s.meta.title!==currentTitle){
        currentTitle=s.meta.title||''; currentUploader=s.meta.uploader||''; currentThumb=s.meta.thumbnail||'';
        npTitle.textContent=currentTitle||'Nothing playing'; npUploader.textContent=currentUploader; npThumbnail.src=currentThumb;
        rpAdd(s.meta); renderRecentStrip();
      }
      if(!s.meta){ npTitle.textContent='Nothing playing'; npUploader.textContent=''; currentTitle=''; currentUploader=''; currentThumb=''; }
      if(gqActive&&prevStatus==='playing'&&st==='idle'&&!pendingId) advanceQueue();
    }

    /* ── Queue ────────────────────────────────── */
    function addToQueue(item){
      if(generalQueue.some(t=>t.id===item.id)) return;
      generalQueue.push({id:item.id,title:item.title,uploader:item.uploader||'',duration:item.duration,thumbnail:item.thumbnail});
      renderQueuePanel();
      toast(`Added: ${item.title}`, 'info');
      const stab=document.querySelector('[data-stab="queue"]');
      stab.textContent=`Queue (${generalQueue.length})`;
      setTimeout(()=>stab.textContent='Queue', 2000);
    }
    function advanceQueue(){
      gqIdx++;
      if(gqIdx>=generalQueue.length){ gqActive=false; gqIdx=0; renderQueuePanel(); return; }
      renderQueuePanel();
      const next=generalQueue[gqIdx]; if(next) internalPlay(next.id);
    }

    /* ── Queue rendering with drag-and-drop ─────── */
    function renderQueuePanel(){
      sideQueue.innerHTML='';
      if(!generalQueue.length){
        sideQueue.innerHTML='<div class="queue-empty">No songs in queue.<br><span style="font-size:10px">Press +Q on any result</span></div>';
        return;
      }
      const hdr=document.createElement('div');
      hdr.style.cssText='display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;';
      hdr.innerHTML=`<span style="font-size:11px;color:var(--text-3);font-family:var(--mono)">${generalQueue.length} track${generalQueue.length>1?'s':''} · drag to reorder</span>`;
      const clearBtn=document.createElement('button'); clearBtn.className='btn btn-ghost btn-sm'; clearBtn.textContent='Clear';
      clearBtn.addEventListener('click',()=>{ generalQueue=[]; gqActive=false; gqIdx=0; renderQueuePanel(); });
      hdr.appendChild(clearBtn); sideQueue.appendChild(hdr);

      let dragSrc=null;
      const frag=document.createDocumentFragment();
      generalQueue.forEach((t,i)=>{
        const row=document.createElement('div');
        row.className='side-item'+(i===gqIdx&&gqActive?' active':'');
        row.draggable=true;
        row.addEventListener('dragstart',e=>{ dragSrc=i; row.classList.add('dq-drag'); e.dataTransfer.effectAllowed='move'; });
        row.addEventListener('dragend',()=>{ row.classList.remove('dq-drag'); sideQueue.querySelectorAll('.dq-over').forEach(r=>r.classList.remove('dq-over')); });
        row.addEventListener('dragover',e=>{ e.preventDefault(); e.dataTransfer.dropEffect='move'; sideQueue.querySelectorAll('.dq-over').forEach(r=>r.classList.remove('dq-over')); row.classList.add('dq-over'); });
        row.addEventListener('dragleave',()=>row.classList.remove('dq-over'));
        row.addEventListener('drop',e=>{
          e.preventDefault(); row.classList.remove('dq-over');
          if(dragSrc===null||dragSrc===i) return;
          const [moved]=generalQueue.splice(dragSrc,1);
          generalQueue.splice(i,0,moved);
          if(gqActive){
            if(dragSrc===gqIdx) gqIdx=i;
            else if(dragSrc<gqIdx&&i>=gqIdx) gqIdx--;
            else if(dragSrc>gqIdx&&i<=gqIdx) gqIdx++;
          }
          // Best-effort backend sync
          api('/api/queue/reorder',{method:'POST',body:JSON.stringify({from:dragSrc,to:i})}).catch(()=>{});
          dragSrc=null; renderQueuePanel();
        });
        const handle=document.createElement('span'); handle.className='drag-handle'; handle.title='Drag to reorder'; handle.innerHTML='<i class="ph ph-dots-six-vertical"></i>';
        const num=document.createElement('span'); num.className='queue-num'; num.textContent=i+1;
        const img=document.createElement('img'); img.loading='lazy'; img.src=t.thumbnail||''; img.alt=''; img.width=48; img.height=28;
        const info=document.createElement('div'); info.className='side-item-info';
        const tt=document.createElement('div'); tt.className='side-item-title'; tt.textContent=t.title;
        const su=document.createElement('div'); su.className='side-item-sub'; su.textContent=t.uploader||'';
        info.append(tt,su);
        const acts=document.createElement('div'); acts.className='side-item-actions';
        const rm=document.createElement('button'); rm.className='btn-icon btn-sm'; rm.title='Remove'; rm.innerHTML='<i class="ph ph-x"></i>';
        rm.addEventListener('click',e=>{ e.stopPropagation(); generalQueue.splice(i,1); if(gqActive&&gqIdx>=i&&gqIdx>0) gqIdx--; if(!generalQueue.length){gqActive=false;gqIdx=0;} renderQueuePanel(); });
        acts.appendChild(rm);
        row.append(handle,num,img,info,acts);
        row.addEventListener('click',()=>{ gqIdx=i; gqActive=true; internalPlay(t.id); renderQueuePanel(); });
        frag.appendChild(row);
      });
      sideQueue.appendChild(frag);
    }

    /* ── Recommendations ──────────────────────── */
    async function loadRecs(title,uploader){
      sideRecs.innerHTML='<div class="muted" style="font-size:11px;padding:8px">Loading…</div>';
      try{
        const d=await api(`/api/related?title=${encodeURIComponent(title)}&uploader=${encodeURIComponent(uploader||'')}&limit=50`);
        allRecs=d.results||[]; recsIdx=0; renderRecsChunk(true);
      }catch{ sideRecs.innerHTML='<div class="muted" style="font-size:11px;padding:8px">No recommendations.</div>'; }
    }
    function renderRecsChunk(clear=false){
      if(clear){ sideRecs.innerHTML=''; recsIdx=0; }
      const slice=allRecs.slice(recsIdx,recsIdx+RECS_BATCH);
      const frag=document.createDocumentFragment();
      slice.forEach(item=>{
        const row=document.createElement('div'); row.className='side-item';
        const img=document.createElement('img'); img.loading='lazy'; img.src=item.thumbnail||''; img.alt=''; img.width=48; img.height=28;
        const info=document.createElement('div'); info.className='side-item-info';
        const tt=document.createElement('div'); tt.className='side-item-title'; tt.textContent=item.title||'';
        const su=document.createElement('div'); su.className='side-item-sub'; su.textContent=item.uploader||'';
        info.append(tt,su);
        const acts=document.createElement('div'); acts.className='side-item-actions';
        const pb=document.createElement('button'); pb.className='btn-icon btn-sm'; pb.innerHTML='<i class="ph ph-play"></i>';
        pb.addEventListener('click',e=>{ e.stopPropagation(); handlePlay(item.id,item); });
        const qb=document.createElement('button'); qb.className='btn-icon btn-sm'; qb.textContent='+Q';
        qb.addEventListener('click',e=>{ e.stopPropagation(); addToQueue(item); qb.textContent='+'; qb.disabled=true; setTimeout(()=>{qb.textContent='+Q';qb.disabled=false;},1400); });
        acts.append(pb,qb);
        row.append(img,info,acts);
        row.addEventListener('click',()=>handlePlay(item.id,item));
        frag.appendChild(row);
      });
      sideRecs.appendChild(frag); recsIdx+=slice.length;
    }
    el('sideRecs').addEventListener('scroll',()=>{
      const e2=el('sideRecs');
      if(e2.scrollTop+e2.clientHeight>=e2.scrollHeight-60&&recsIdx<allRecs.length) renderRecsChunk();
    });

    /* ── History ──────────────────────────────── */
    async function loadHistory(){
      try{
        const d=await api('/api/history'); const h=d.history||[];
        sideHistory.innerHTML='';
        if(!h.length){sideHistory.innerHTML='<div class="queue-empty">No history yet.</div>';return;}
        const frag=document.createDocumentFragment();
        h.forEach(item=>{
          const row=document.createElement('div'); row.className='side-item';
          const img=document.createElement('img'); img.loading='lazy'; img.src=item.thumbnail||''; img.alt=''; img.width=48; img.height=28;
          const info=document.createElement('div'); info.className='side-item-info';
          const tt=document.createElement('div'); tt.className='side-item-title'; tt.textContent=item.title;
          const su=document.createElement('div'); su.className='side-item-sub'; su.textContent=item.uploader||'';
          info.append(tt,su);
          const acts=document.createElement('div'); acts.className='side-item-actions';
          const pb=document.createElement('button'); pb.className='btn-icon btn-sm'; pb.innerHTML='<i class="ph ph-play"></i>';
          pb.addEventListener('click',e=>{e.stopPropagation();handlePlay(item.id||item.title,item);});
          const qb=document.createElement('button'); qb.className='btn-icon btn-sm'; qb.textContent='+Q';
          qb.addEventListener('click',e=>{e.stopPropagation();addToQueue(item);qb.textContent='+';qb.disabled=true;setTimeout(()=>{qb.textContent='+Q';qb.disabled=false;},1400);});
          acts.append(pb,qb);
          row.append(img,info,acts);
          row.addEventListener('click',()=>handlePlay(item.id||item.title,item));
          frag.appendChild(row);
        });
        sideHistory.appendChild(frag);
      }catch{}
    }

    /* ── Playlists ────────────────────────────── */
    function buildPlaylistCollage(id, placeholder, tracks) {
      // tracks may be provided directly or fetched
      async function render(tks) {
        const thumbs = tks.filter(t=>t.thumbnail).slice(0,4).map(t=>t.thumbnail);
        if (!thumbs.length) return; // keep placeholder
        const collage = document.createElement('div'); collage.className='pl-collage';
        // Fill all 4 cells (repeat last thumb if fewer than 4)
        for (let i=0;i<4;i++) {
          const img=document.createElement('img'); img.src=thumbs[i]||thumbs[thumbs.length-1]; img.alt='';
          img.onerror=()=>{ img.style.background='var(--surface-3)'; img.src=''; };
          collage.appendChild(img);
        }
        if (placeholder.parentNode) placeholder.replaceWith(collage);
      }
      if (tracks) { render(tracks); return; }
      api(`/api/playlists/${id}`).then(d=>render(d.playlist?.tracks||[])).catch(()=>{});
    }

    async function loadPlaylists(){
      try{
        const d=await api('/api/playlists'); playlists=d.playlists||[]; renderPlaylists();
      }catch(err){ el('playlistList').innerHTML=`<span class="error">${esc(err.message)}</span>`; }
    }
    function renderPlaylists(){
      const container=el('playlistList'); container.innerHTML='';
      if(!playlists.length){ container.innerHTML='<div class="muted" style="font-size:12px;padding:8px 0">No playlists yet. Create one above!</div>'; return; }
      const frag=document.createDocumentFragment();
      playlists.forEach(pl=>{
        const card=document.createElement('div'); card.className='pl-card';
        const head=document.createElement('div'); head.className='pl-card-head';
        // Cover art placeholder — replaced with real image after tracks load
        const coverEl=document.createElement('div'); coverEl.className='pl-cover-ph'; coverEl.innerHTML='<i class="ph ph-music-note" style="font-size:18px;color:var(--text-3)"></i>'; coverEl.dataset.plid=pl.id;
        const nameBtn=document.createElement('button'); nameBtn.className='pl-card-name'; nameBtn.textContent=pl.name;
        nameBtn.title='Click to expand, double-click to rename';
        nameBtn.addEventListener('click',()=>togglePlExpand(pl.id));
        nameBtn.addEventListener('dblclick',()=>startRenamePl(pl.id,nameBtn));
        const count=document.createElement('span'); count.className='pl-count'; count.textContent=`${pl.trackCount??0} track${(pl.trackCount??0)!==1?'s':''}`;
        const actions=document.createElement('div'); actions.style.cssText='display:flex;gap:4px';
        const playBtn=document.createElement('button'); playBtn.className='btn btn-accent btn-sm'; playBtn.innerHTML='<i class="ph ph-play"></i> Play';
        playBtn.addEventListener('click',e=>{e.stopPropagation();startPlaylistQueue(pl.id,'sequential');});
        const shufBtn=document.createElement('button'); shufBtn.className='btn btn-ghost btn-sm'; shufBtn.innerHTML='<i class="ph ph-shuffle"></i>';
        shufBtn.addEventListener('click',e=>{e.stopPropagation();startPlaylistQueue(pl.id,'shuffle');});
        const delBtn=document.createElement('button'); delBtn.className='btn btn-danger btn-sm'; delBtn.innerHTML='<i class="ph ph-x"></i>';
        delBtn.addEventListener('click',async e=>{e.stopPropagation();if(!confirm(`Delete "${pl.name}"?`))return;try{await api(`/api/playlists/${pl.id}`,{method:'DELETE'});await loadPlaylists();}catch(err){alert(err.message);}});
        actions.append(playBtn,shufBtn,delBtn);
        head.append(coverEl,nameBtn,count,actions);
        card.appendChild(head);
        if(expandedPl===pl.id){
          const tracks=document.createElement('div'); tracks.className='pl-tracks';
          tracks.innerHTML='<div class="muted" style="font-size:11px">Loading…</div>';
          card.appendChild(tracks);
          loadPlaylistTracks(pl.id,tracks,coverEl);
        } else {
          // Build collage from coverUrl or fetch track thumbnails
          buildPlaylistCollage(pl.id, coverEl);
        }
        frag.appendChild(card);
      });
      container.appendChild(frag);
    }
    function togglePlExpand(id){ expandedPl=expandedPl===id?null:id; renderPlaylists(); }
    async function loadPlaylistTracks(id,container,coverEl){
      try{
        const d=await api(`/api/playlists/${id}`); const tracks=d.playlist?.tracks||[];
        // Build collage from actual tracks
        if(coverEl) buildPlaylistCollage(id, coverEl, tracks);
        container.innerHTML='';
        if(!tracks.length){container.innerHTML='<div class="muted" style="font-size:11px">No tracks.</div>';return;}
        tracks.forEach((t,i)=>{
          const row=document.createElement('div'); row.className='pl-track';
          const n=document.createElement('span'); n.className='pl-track-num'; n.textContent=i+1;
          const tt=document.createElement('span'); tt.className='pl-track-title'; tt.textContent=t.title; tt.title=t.title;
          const up=document.createElement('span'); up.className='pl-track-up'; up.textContent=t.uploader||'';
          const pb=document.createElement('button'); pb.className='btn-icon btn-sm'; pb.innerHTML='<i class="ph ph-play"></i>';
          pb.addEventListener('click',()=>{gqActive=false;handlePlay(t.id,t);});
          const rm=document.createElement('button'); rm.className='btn-icon btn-sm btn-danger'; rm.innerHTML='<i class="ph ph-x"></i>';
          rm.addEventListener('click',async()=>{try{await api(`/api/playlists/${id}/tracks/${t.id}`,{method:'DELETE'});await loadPlaylists();}catch(err){alert(err.message);}});
          row.append(n,tt,up,pb,rm); container.appendChild(row);
        });
      }catch(err){container.innerHTML=`<span class="error">${esc(err.message)}</span>`;}
    }
    async function startRenamePl(id,nameBtn){
      const pl=playlists.find(p=>p.id===id); if(!pl) return;
      const input=document.createElement('input'); input.className='pl-rename-input'; input.value=pl.name;
      input.addEventListener('blur',async()=>{
        const n=input.value.trim();
        if(n&&n!==pl.name){try{await api(`/api/playlists/${id}`,{method:'PATCH',body:JSON.stringify({name:n})});await loadPlaylists();}catch(err){alert(err.message);}}
        else renderPlaylists();
      });
      input.addEventListener('keydown',e=>{if(e.key==='Enter') input.blur();if(e.key==='Escape') renderPlaylists();});
      nameBtn.replaceWith(input); input.focus(); input.select();
    }
    el('createPlBtn').addEventListener('click',async()=>{
      const name=el('newPlName').value.trim(); if(!name) return;
      try{await api('/api/playlists',{method:'POST',body:JSON.stringify({name})});el('newPlName').value='';await loadPlaylists();}
      catch(err){alert(err.message);}
    });
    el('newPlName').addEventListener('keydown',e=>{ if(e.key==='Enter') el('createPlBtn').click(); });
    async function startPlaylistQueue(id,mode){
      try{
        const d=await api(`/api/playlists/${id}`); const tracks=d.playlist?.tracks||[];
        if(!tracks.length){alert('Playlist is empty!');return;}
        generalQueue=tracks.map(t=>({id:t.id,title:t.title,uploader:t.uploader||'',duration:t.duration,thumbnail:t.thumbnail}));
        if(mode==='shuffle') shuffle(generalQueue);
        gqActive=true; gqIdx=0; renderQueuePanel();
        document.querySelector('[data-stab="queue"]').click();
        const first=generalQueue[0]; if(first) internalPlay(first.id);
      }catch(err){alert(err.message);}
    }
    function shuffle(arr){ for(let i=arr.length-1;i>0;i--){const j=Math.random()*(i+1)|0;[arr[i],arr[j]]=[arr[j],arr[i]];} }

    /* ── AI Chat ──────────────────────────────── */
    const chatPanel=el('chatPanel');
    el('chatToggle').addEventListener('click',()=>chatPanel.classList.toggle('open'));
    document.addEventListener('click',e=>{
      if(!chatPanel.contains(e.target)&&e.target!==el('chatToggle')) chatPanel.classList.remove('open');
    });
    async function sendChat(){
      const msg=el('chatInput').value.trim(); if(!msg) return;
      el('chatInput').value=''; el('chatSend').disabled=true;
      appendMsg('user',msg);
      const typing=appendMsg('ai','…typing',true);
      try{
        const r=await fetch('/api/chat',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({message:msg})});
        const d=await r.json(); typing.remove();
        if(!d.ok) throw new Error(d.error||'AI request failed');
        const bubble=document.createElement('div'); bubble.className='msg ai';
        const msgDiv=document.createElement('div'); msgDiv.style.marginBottom='8px'; msgDiv.textContent=d.message||''; bubble.appendChild(msgDiv);
        const sugWrap=document.createElement('div');
        (d.suggestions||[]).forEach(s=>{
          const query=s.query||'';
          const row=document.createElement('div'); row.className='sug-row';
          const playBtn=document.createElement('button'); playBtn.className='sug-btn'; playBtn.textContent=query; playBtn.title=s.reason||'';
          const qBtn=document.createElement('button'); qBtn.className='sug-q-btn'; qBtn.textContent='+Q'; qBtn.title='Add to queue';
          playBtn.addEventListener('click',async()=>{
            playBtn.disabled=true; playBtn.textContent='⏳ Loading…'; qBtn.disabled=true;
            chatPanel.classList.remove('open');
            try{
              pendingId=query; npStatusText.textContent='LOADING'; npDot.className='dot';
              const resp=await api('/api/play',{method:'POST',body:JSON.stringify({query})});
              pendingId=null; playingId=resp.result?.meta?.id||null;
              if(resp.result?.meta){
                const meta=resp.result.meta;
                currentTitle=meta.title||query; currentUploader=meta.uploader||''; currentThumb=meta.thumbnail||'';
                npTitle.textContent=currentTitle; npUploader.textContent=currentUploader; npThumbnail.src=currentThumb;
                if(!generalQueue.some(t=>t.id===meta.id)){ generalQueue.push({id:meta.id,title:meta.title,uploader:meta.uploader||'',duration:meta.duration,thumbnail:meta.thumbnail}); gqIdx=generalQueue.length-1; gqActive=true; renderQueuePanel(); }
                rpAdd(meta); renderRecentStrip();
              }
              setAdaptivePoll('playing'); await refreshStatus();
              if(currentTitle) loadRecs(currentTitle,currentUploader);
              playBtn.textContent='Playing';
            }catch(err){ pendingId=null; playBtn.textContent=query; playBtn.disabled=false; qBtn.disabled=false; controlError.textContent=err.message; }
          });
          qBtn.addEventListener('click',()=>{
            const item={id:query,title:query,uploader:'',duration:null,thumbnail:''};
            if(!generalQueue.some(t=>t.id===query)){generalQueue.push(item);renderQueuePanel();}
            qBtn.textContent='+'; qBtn.disabled=true; setTimeout(()=>{qBtn.textContent='+Q';qBtn.disabled=false;},1400);
          });
          row.append(playBtn,qBtn); sugWrap.appendChild(row);
        });
        bubble.appendChild(sugWrap); el('chatMsgs').appendChild(bubble);
      }catch(err){ typing.remove(); appendMsg('ai',`Error: ${err.message}`); }
      el('chatSend').disabled=false; el('chatMsgs').scrollTop=9999;
    }
    function appendMsg(role,text){
      const div=document.createElement('div'); div.className='msg '+role; div.textContent=text;
      el('chatMsgs').appendChild(div); el('chatMsgs').scrollTop=9999; return div;
    }
    el('chatSend').addEventListener('click',sendChat);
    el('chatInput').addEventListener('keydown',e=>{ if(e.key==='Enter') sendChat(); });

    /* ── Boot ─────────────────────────────────── */
    refreshStatus();
    loadPlaylists();
    loadHistory();
    renderRecentStrip();
    setAdaptivePoll('idle');
    setInterval(()=>{ if(!document.hidden) loadHistory(); }, 15000);
    renderQueuePanel();
    </script>
  </body>
</html>

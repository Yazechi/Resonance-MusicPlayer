       - Progress bar via CSS width (no input DOM thrashing)
       - rAF tick only redraws when values actually change
       - Sidebar tabs (Related / Queue / History) replace scattered panels
       - Single-pass DOM render helpers (no innerHTML string-concat loops)
       - Batch DOM writes with requestAnimationFrame
       - Event delegation for result rows
       - Image lazy loading
    ===================================================================== */

    /* ── Utilities ─────────────────────────────── */
    const esc = t => String(t??'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[m]);
    const fmt = s => { s=Math.max(0,s|0); return `${(s/60|0)}:${String(s%60).padStart(2,'0')}`; };
    const el = id => document.getElementById(id);
    const cls = (...c) => c.filter(Boolean).join(' ');

    async function api(path, opts={}) {
      const r = await fetch(path, { ...opts, headers: {'Content-Type':'application/json', ...(opts.headers||{})} });
      const d = await r.json();
      if (!d.ok) throw new Error(d.error || 'Request failed');
      return d;
    }

    /* ── State ────────────────────────────────── */
    let results = [];
    let page = 0; // kept for compat but unused
    let lastStatus = 'idle';
    let lastPos = 0, lastDur = 0, lastUpdateTs = Date.now();
    let isSeeking = false;
    let playingId = null, pendingId = null;
    let currentTitle = '', currentUploader = '', currentThumb = '';
    let playlists = [];
    let expandedPl = null;
    let playing = false;

    // Queues
    let generalQueue = [], gqIdx = 0, gqActive = false;

    // Recs cache/pagination
    let allRecs = [], recsIdx = 0;
    const RECS_BATCH = 10;

    // Adaptive polling
    let pollInterval = null;
    let prevPollStatus = null;

    /* ── localStorage helpers ──────────────────── */
    const lsGet = (k,d=null) => { try{ const v=localStorage.getItem(k); return v===null?d:JSON.parse(v); }catch{return d;} };
    const lsSet = (k,v) => { try{ localStorage.setItem(k,JSON.stringify(v)); }catch{} };

    /* ── Toast ─────────────────────────────────── */
    function toast(msg, icon='🎵', dur=2800) {
      const shelf = el('toastShelf');
      const t = document.createElement('div'); t.className='toast';
      t.innerHTML = `<span class="toast-icon">${icon}</span><span>${esc(msg)}</span>`;
      shelf.appendChild(t);
      setTimeout(()=>{ t.classList.add('out'); setTimeout(()=>t.remove(), 200); }, dur);
    }

    /* ── Search history (localStorage) ────────── */
    let searchHistory = lsGet('rq_sh', []);

    function shAdd(q) {
      searchHistory = [q, ...searchHistory.filter(x=>x!==q)].slice(0,12);
      lsSet('rq_sh', searchHistory);
    }
    function shRemove(q) {
      searchHistory = searchHistory.filter(x=>x!==q);
      lsSet('rq_sh', searchHistory);
      renderShDrop();
    }
    function renderShDrop() {
      const drop = el('searchHistDrop');
      if (!searchHistory.length) { drop.classList.remove('open'); drop.innerHTML=''; return; }
      drop.innerHTML='';
      searchHistory.forEach(q => {
        const row = document.createElement('div'); row.className='sh-row';
        const ico = document.createElement('span'); ico.className='sh-icon'; ico.textContent='🕐';
        const txt = document.createElement('span'); txt.className='sh-text'; txt.textContent=q;
        const del = document.createElement('button'); del.className='sh-del'; del.textContent='✕'; del.title='Remove';
        del.addEventListener('click', e=>{ e.stopPropagation(); shRemove(q); });
        txt.addEventListener('click', ()=>{ el('searchInput').value=q; drop.classList.remove('open'); doSearch(); });
        row.append(ico, txt, del);
        drop.appendChild(row);
      });
      drop.classList.add('open');
    }
    el('searchInput').addEventListener('focus', ()=>{
      if (!el('searchInput').value.trim() && searchHistory.length) renderShDrop();
    });
    document.addEventListener('click', e=>{
      if (!el('searchBar').contains(e.target)) el('searchHistDrop').classList.remove('open');
    });

    /* ── Recently Played (localStorage) ───────── */
    let recentlyPlayed = lsGet('rq_recent', []); // [{id,title,uploader,thumbnail}]

    function rpAdd(item) {
      if (!item?.id) return;
      recentlyPlayed = [{id:item.id,title:item.title||'',uploader:item.uploader||'',thumbnail:item.thumbnail||''},
        ...recentlyPlayed.filter(x=>x.id!==item.id)].slice(0,20);
      lsSet('rq_recent', recentlyPlayed);
    }
    function renderRecentStrip() {
      const strip = el('recentStrip');
      if (!recentlyPlayed.length || el('searchInput').value.trim()) { strip.style.display='none'; return; }
      strip.style.display='block';
      const cards = el('recentCards');
      cards.innerHTML='';
      recentlyPlayed.slice(0,12).forEach(item=>{
        const c = document.createElement('div'); c.className='rc-card';
        const img = document.createElement('img'); img.loading='lazy'; img.src=item.thumbnail||''; img.alt='';
        const info = document.createElement('div'); info.className='rc-info';
        const tt = document.createElement('div'); tt.className='rc-title'; tt.textContent=item.title;
        const up = document.createElement('div'); up.className='rc-up'; up.textContent=item.uploader;
        info.append(tt,up); c.append(img,info);
        c.addEventListener('click',()=>handlePlay(item.id,item));
        cards.appendChild(c);
      });
    }

    /* ── Keyboard shortcuts ────────────────────── */
    document.addEventListener('keydown', e=>{
      const tag = document.activeElement?.tagName?.toLowerCase();
      if (tag==='input'||tag==='textarea') return; // don't steal focus from typing
      switch(e.key){
        case ' ':
          e.preventDefault();
          if(lastStatus==='playing'){ lastStatus='paused'; playPauseBtn.innerHTML='▶'; postCtrl('/api/pause'); }
          else{ lastStatus='playing'; playPauseBtn.innerHTML='⏸'; postCtrl('/api/resume'); }
          break;
        case 'ArrowRight':
          e.preventDefault();
          { const pos = Math.min((lastPos||0)+10, lastDur||999);
            api('/api/seek',{method:'POST',body:JSON.stringify({position:pos})}).catch(()=>{});
            lastPos=pos; lastUpdateTs=Date.now(); toast('+10s','⏩',1000); }
          break;
        case 'ArrowLeft':
          e.preventDefault();
          { const pos = Math.max((lastPos||0)-10, 0);
            api('/api/seek',{method:'POST',body:JSON.stringify({position:pos})}).catch(()=>{});
            lastPos=pos; lastUpdateTs=Date.now(); toast('-10s','⏪',1000); }
          break;
        case 'ArrowUp':
          e.preventDefault();
          { const v=Math.min(100,Number(el('volume').value)+5); el('volume').value=v; el('volNum').textContent=v;
            api('/api/volume',{method:'POST',body:JSON.stringify({level:v})}).catch(()=>{}); toast(`Vol ${v}%`,'🔊',900); }
          break;
        case 'ArrowDown':
          e.preventDefault();
          { const v=Math.max(0,Number(el('volume').value)-5); el('volume').value=v; el('volNum').textContent=v;
            api('/api/volume',{method:'POST',body:JSON.stringify({level:v})}).catch(()=>{}); toast(`Vol ${v}%`,'🔉',900); }
          break;
        case 'n': case 'N':
          el('nextBtn').click(); break;
        case 'p': case 'P':
          el('prevBtn').click(); break;
        case 'm': case 'M':
          { const cur=Number(el('volume').value); const nv=cur>0?0:70;
            el('volume').value=nv; el('volNum').textContent=nv;
            api('/api/volume',{method:'POST',body:JSON.stringify({level:nv})}).catch(()=>{});
            toast(nv===0?'Muted':'Unmuted',nv===0?'🔇':'🔊',900); }
          break;
      }
    });

    /* ── EQ Presets ────────────────────────────── */
    const EQ_PRESETS = [
      { name:'Flat',    af:'' },
      { name:'Bass+',   af:'bass=g=6' },
      { name:'Treble+', af:'treble=g=5' },
      { name:'Vocal',   af:'equalizer=f=250:g=-3:width_type=o:width=2,equalizer=f=3500:g=4:width_type=o:width=2' },
      { name:'Lo-Fi',   af:'lowpass=f=3000,aecho=0.8:0.88:60:0.4' },
      { name:'Night',   af:'bass=g=4,treble=g=-3,volume=0.75' },
    ];
    let activeEq = lsGet('rq_eq','Flat');

    function buildEqButtons() {
      const wrap = el('eqBtns'); wrap.innerHTML='';
      EQ_PRESETS.forEach(p=>{
        const b = document.createElement('button');
        b.className = 'eq-btn'+(activeEq===p.name?' active':'');
        b.textContent = p.name;
        b.addEventListener('click',()=>applyEq(p));
        wrap.appendChild(b);
      });
      el('eqLabel').textContent = activeEq;
    }
    async function applyEq(preset) {
      activeEq = preset.name; lsSet('rq_eq', preset.name);
      el('eqLabel').textContent = preset.name;
      document.querySelectorAll('.eq-btn').forEach(b=>b.classList.toggle('active', b.textContent===preset.name));
      try { await api('/api/eq',{method:'POST',body:JSON.stringify({filters:preset.af})}); }
      catch { /* endpoint optional — silently skip */ }
      toast(`EQ: ${preset.name}`, '🎚️');
    }

    /* ── Lyrics ────────────────────────────────── */
    let lyricsLines = [], lyricsFor = '', lastLyrIdx = -1;

    async function fetchLyrics(title, uploader) {
      const key = title+'||'+uploader;
      if (lyricsFor===key) return;
      lyricsFor=key; lyricsLines=[]; lastLyrIdx=-1;
      el('lyricsWrap').innerHTML='<div id="lyricsMsg">Loading lyrics…</div>';
      try {
        const q=encodeURIComponent(title), ar=encodeURIComponent(uploader||'');
        const r=await fetch(`https://lrclib.net/api/search?q=${q}&artist_name=${ar}`);
        if (!r.ok) throw new Error('no results');
        const data=await r.json();
        if (!Array.isArray(data)||!data.length) throw new Error('no results');
        const track = data.find(t=>t.syncedLyrics)||data[0];
        if (track.syncedLyrics) {
          lyricsLines = track.syncedLyrics.split('\n').map(l=>{
            const m=l.match(/^\[(\d+):(\d+\.\d+)\](.*)/);
            return m ? {t:parseInt(m[1])*60+parseFloat(m[2]), text:m[3].trim()} : null;
          }).filter(Boolean);
          renderSyncedLyrics();
        } else if (track.plainLyrics) {
          renderPlainLyrics(track.plainLyrics);
        } else throw new Error('no lyrics');
      } catch {
        el('lyricsWrap').innerHTML='<div id="lyricsMsg">No lyrics found.</div>';
      }
    }

    function renderSyncedLyrics() {
      el('lyricsWrap').innerHTML='';
      lyricsLines.forEach((l,i)=>{
        const d=document.createElement('div'); d.className='lyric-line'; d.dataset.li=i;
        d.textContent=l.text||'♪';
        el('lyricsWrap').appendChild(d);
      });
    }
    function renderPlainLyrics(text) {
      el('lyricsWrap').innerHTML='';
      text.split('\n').forEach(line=>{
        const d=document.createElement('div'); d.className='lyric-line'; d.textContent=line||' ';
        el('lyricsWrap').appendChild(d);
      });
    }
    function updateLyricHighlight(pos) {
      if (!lyricsLines.length) return;
      let idx=0;
      for (let i=0;i<lyricsLines.length;i++) { if(lyricsLines[i].t<=pos) idx=i; else break; }
      if (idx===lastLyrIdx) return;
      lastLyrIdx=idx;
      el('lyricsWrap').querySelectorAll('.lyric-line').forEach((el2,i)=>{
        el2.classList.toggle('lyr-active', i===idx);
        el2.classList.toggle('lyr-near', i===idx-1||i===idx+1);
      });
      const active=el('lyricsWrap').querySelector('.lyr-active');
      if (active) active.scrollIntoView({block:'center',behavior:'smooth'});
    }
    // Poll lyrics highlight every 350ms when playing
    setInterval(()=>{
      if (lastStatus==='playing' && lyricsLines.length) {
        const proj=lastPos+(Date.now()-lastUpdateTs)/1000;
        updateLyricHighlight(proj);
      }
    }, 350);

    /* ── Visualizer ───────────────────────────── */
    const vizEl = el('vizBars');
    for (let i=0;i<8;i++) { const b=document.createElement('div'); b.className='vb'; vizEl.appendChild(b); }
    const vBars = [...vizEl.querySelectorAll('.vb')];
    let vizTs = 0;
    function animViz(playing) {
      if (!playing) { vBars.forEach(b=>b.style.height='3px'); return; }
      vBars.forEach(b=>b.style.height=(3+Math.random()*11)+'px');
    }

    /* ── DOM refs ─────────────────────────────── */
    const searchView = el('searchView');
    const playlistView = el('playlistView');
    const npThumbnail = el('npThumbnail');
    const npDot = el('npDot');
    const npStatusText = el('npStatusText');
    const npTitle = el('npTitle');
    const npUploader = el('npUploader');
    const progressFill = el('progressFill');
    const progressInput = el('progress');
    const curTimeEl = el('curTime');
    const totalTimeEl = el('totalTime');
    const playPauseBtn = el('playPauseBtn');
    const controlError = el('controlError');
    const resultsEl = el('results');
    const sideRecs = el('sideRecs');
    const sideQueue = el('sideQueue');
    const sideHistory = el('sideHistory');

    /* ── Tab navigation ───────────────────────── */
    document.querySelectorAll('.tab-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
        btn.classList.add('active');
        document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));
        el(btn.dataset.tab).classList.add('active');
      });
    });

    document.querySelectorAll('.stab').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.stab').forEach(b=>b.classList.remove('active'));
        btn.classList.add('active');
        el('sideRecs').classList.add('hidden');
        el('sideLyrics').classList.add('hidden');
        el('sideQueue').classList.add('hidden');
        el('sideHistory').classList.add('hidden');
        const map = {recs:'sideRecs',lyrics:'sideLyrics',queue:'sideQueue',history:'sideHistory'};
        el(map[btn.dataset.stab]).classList.remove('hidden');
      });
    });

    /* ── Search ───────────────────────────────── */
    let searchDebounce = null;
    let searchSeq = 0; // sequence counter to cancel stale requests

    el('searchInput').addEventListener('input', () => {
      clearTimeout(searchDebounce);
      const q = el('searchInput').value.trim();
      if (!q) {
        clearResults();
        renderRecentStrip();
        if (searchHistory.length) renderShDrop();
        return;
      }
      el('recentStrip').style.display='none';
      el('searchHistDrop').classList.remove('open');
      showSkeleton();
      searchDebounce = setTimeout(doSearch, 380);
    });
    el('searchInput').addEventListener('keydown', e => {
      if (e.key==='Enter') { clearTimeout(searchDebounce); el('searchHistDrop').classList.remove('open'); doSearch(); }
      if (e.key==='Escape') el('searchHistDrop').classList.remove('open');
    });
    el('searchClear').addEventListener('click', () => {
      el('searchInput').value = ''; clearResults(); renderRecentStrip();
    });

    function clearResults() {
      results=[]; page=0;
      resultsEl.innerHTML='';
      el('resultsCount').innerHTML='';
    }

    function showSkeleton() {
      resultsEl.innerHTML = Array(6).fill(0).map(()=>`
        <div class="skel-row">
          <div class="skeleton skel-thumb"></div>
          <div class="skel-lines">
            <div class="skeleton skel-line skel-line-w1"></div>
            <div class="skeleton skel-line skel-line-w2"></div>
          </div>
        </div>`).join('');
    }

    async function doSearch() {
      const q = el('searchInput').value.trim();
      if (!q) return;
      const seq = ++searchSeq;
      el('searchSpinner').style.display = 'block';
      el('searchClear').style.display = 'none';
      try {
        const d = await api(`/api/search?q=${encodeURIComponent(q)}&limit=30`);
        if (seq !== searchSeq) return; // stale
        results = d.results || [];
        page = 0;
        shAdd(q); // save to history
        renderResults();
      } catch (err) {
        if (seq !== searchSeq) return;
        resultsEl.innerHTML = `<div class="error" style="padding:12px">${esc(err.message)}</div>`;
      } finally {
        if (seq === searchSeq) {
          el('searchSpinner').style.display = 'none';
          el('searchClear').style.display = '';
        }
      }
    }

    function renderResults() {
      el('resultsCount').innerHTML = results.length
        ? `<span style="font-family:var(--mono);font-size:10px;color:var(--text-3)">${results.length} results</span><span class="bar"></span>`
        : '';
      resultsEl.innerHTML = '';
      const frag = document.createDocumentFragment();
      results.forEach(item => frag.appendChild(buildResultRow(item)));
      resultsEl.appendChild(frag);
    }

    function buildResultRow(item) {
      const row = document.createElement('div');
      row.className = 'result-row' + (playingId===item.id ? ' playing' : '');
      row.dataset.id = item.id;
      row.dataset.title = item.title||'';
      row.dataset.uploader = item.uploader||'';

      const img = document.createElement('img');
      img.loading = 'lazy';
      img.src = item.thumbnail||'';
      img.alt = '';
      img.width = 68; img.height = 38;

      const info = document.createElement('div');
      info.className = 'result-info';
      const t = document.createElement('div'); t.className='result-title'; t.textContent=item.title||'Untitled';
      const m = document.createElement('div'); m.className='result-meta';
      m.innerHTML = `<span>${esc(item.uploader||'')}</span>${item.duration?`<span class="dur">${esc(item.duration)}</span>`:''}`;
      info.append(t,m);

      const actions = document.createElement('div'); actions.className='result-actions';

      const playBtn = document.createElement('button');
      playBtn.className = 'btn-icon';
      playBtn.title = 'Play';
      playBtn.innerHTML = playingId===item.id ? '🔊' : '▶';
      playBtn.disabled = !!pendingId;
      playBtn.addEventListener('click', e => { e.stopPropagation(); handlePlay(item.id, item); });

      const qBtn = document.createElement('button');
      qBtn.className = 'btn-icon btn-sm'; qBtn.title='Add to queue'; qBtn.textContent='+Q';
      qBtn.addEventListener('click', e => {
        e.stopPropagation();
        addToQueue(item);
        qBtn.textContent='✓'; qBtn.disabled=true;
        setTimeout(()=>{ qBtn.textContent='+Q'; qBtn.disabled=false; },1400);
      });

      actions.append(playBtn, qBtn);

      if (playlists.length > 0) {
        const wrap = buildPlaylistDropdown(item);
        actions.appendChild(wrap);
      }

      row.append(img, info, actions);
      row.addEventListener('click', () => handlePlay(item.id, item));
      return row;
    }

    // (pagination removed — all results rendered at once)

    /* ── Playlist dropdown helper ─────────────── */
    function buildPlaylistDropdown(item) {
      const wrap = document.createElement('div'); wrap.className='dropdown-wrap';
      const btn = document.createElement('button'); btn.className='btn-icon btn-sm'; btn.textContent='+';
      btn.title='Add to playlist';
      btn.addEventListener('click', e => {
        e.stopPropagation();
        const ex = wrap.querySelector('.dropdown-menu');
        if (ex) { ex.remove(); return; }
        document.querySelectorAll('.dropdown-menu').forEach(m=>m.remove());
        const menu = document.createElement('div'); menu.className='dropdown-menu';
        playlists.forEach(pl => {
          const mi = document.createElement('button'); mi.className='dropdown-item'; mi.textContent=pl.name;
          mi.addEventListener('click', async ev => {
            ev.stopPropagation();
            try {
              await api(`/api/playlists/${pl.id}/tracks`,{method:'POST',body:JSON.stringify({id:item.id,title:item.title,uploader:item.uploader,duration:item.duration,thumbnail:item.thumbnail})});
              mi.textContent='✓ Added'; mi.disabled=true;
              await loadPlaylists();
            } catch(err){ mi.textContent=err.message; }
          });
          menu.appendChild(mi);
        });
        wrap.appendChild(menu);
        // Close on outside click
        setTimeout(()=>{ document.addEventListener('click',()=>menu.remove(),{once:true}); },0);
      });
      wrap.appendChild(btn);
      return wrap;
    }

    /* ── Play handling ────────────────────────── */
    async function handlePlay(id, itemMeta) {
      if (pendingId) return;
      controlError.textContent='';
      pendingId = id;

      // Optimistic UI update
      if (itemMeta) {
        npTitle.textContent = itemMeta.title||'Loading…';
        npUploader.textContent = itemMeta.uploader||'';
        npThumbnail.src = itemMeta.thumbnail||'';
        currentTitle = itemMeta.title||'';
        currentUploader = itemMeta.uploader||'';
        currentThumb = itemMeta.thumbnail||'';
      }
      npStatusText.textContent = 'LOADING';
      npDot.className = 'dot';

      // Add to queue if not already there
      const existing = generalQueue.findIndex(t=>t.id===id);
      if (existing===-1 && itemMeta) {
        generalQueue.push({id:itemMeta.id,title:itemMeta.title,uploader:itemMeta.uploader||'',duration:itemMeta.duration,thumbnail:itemMeta.thumbnail});
        gqIdx = generalQueue.length-1;
      } else if (existing!==-1) {
        gqIdx = existing;
      }
      gqActive = true;
      renderQueuePanel();

      try {
        const resp = await api('/api/play',{method:'POST',body:JSON.stringify({id})});
        playingId = id;
        if (resp.result?.meta) {
          const m = resp.result.meta;
          currentTitle = m.title||''; currentUploader = m.uploader||''; currentThumb = m.thumbnail||'';
          npTitle.textContent = currentTitle;
          npUploader.textContent = currentUploader;
          npThumbnail.src = currentThumb;
          rpAdd(m); // save to recently played
          renderRecentStrip();
          toast(currentTitle, '▶');
        }
        setAdaptivePoll('playing');
        // Load recs + lyrics in background without blocking
        if (currentTitle) { loadRecs(currentTitle, currentUploader); fetchLyrics(currentTitle, currentUploader); }
        loadHistory();
      } catch(err) {
        controlError.textContent = err.message;
        npStatusText.textContent = 'ERROR';
        toast(err.message, '⚠️');
      } finally {
        pendingId = null;
        // Refresh result rows to update play icons
        if (results.length) renderResults();
      }
    }

    async function internalPlay(id) {
      pendingId = id;
      try {
        await api('/api/play',{method:'POST',body:JSON.stringify({id})});
        playingId = id;
        await refreshStatus();
        if (currentTitle) loadRecs(currentTitle, currentUploader);
        loadHistory();
      } catch(err) {
        controlError.textContent = err.message;
      } finally {
        pendingId = null;
      }
    }

    /* ── Controls ─────────────────────────────── */
    async function postCtrl(path, body) {
      controlError.textContent='';
      try {
        await api(path,{method:'POST',body:body?JSON.stringify(body):undefined});
        await refreshStatus();
      } catch(err) {
        controlError.textContent = err.message;
      }
    }

    playPauseBtn.addEventListener('click', () => {
      if (lastStatus==='playing') { lastStatus='paused'; playPauseBtn.innerHTML='▶'; postCtrl('/api/pause'); }
      else { lastStatus='playing'; playPauseBtn.innerHTML='⏸'; postCtrl('/api/resume'); }
    });
    el('stopBtn').addEventListener('click', async () => {
      try {
        await api('/api/stop',{method:'POST'});
        lastStatus='idle'; playingId=null;
        gqActive=false;
        updatePlayerUI({status:'idle',position:0,durationSeconds:0,meta:null});
        renderQueuePanel();
      } catch(err){ controlError.textContent=err.message; }
    });
    el('prevBtn').addEventListener('click', async () => {
      if (!generalQueue.length || gqIdx<=0) { showCtrlMsg('No previous song'); return; }
      try {
        await api('/api/stop',{method:'POST'});
        await waitForIdle(4000);
        gqIdx--;
        renderQueuePanel();
        const prev = generalQueue[gqIdx];
        if (prev) { gqActive=true; await internalPlay(prev.id); }
      } catch(err){ controlError.textContent=err.message; }
    });
    el('nextBtn').addEventListener('click', async () => {
      if (!generalQueue.length || gqIdx>=generalQueue.length-1) { showCtrlMsg('No next song'); return; }
      try {
        await api('/api/stop',{method:'POST'});
        await waitForIdle(4000);
        gqIdx++;
        renderQueuePanel();
        const next = generalQueue[gqIdx];
        if (next) { gqActive=true; await internalPlay(next.id); }
      } catch(err){ controlError.textContent=err.message; }
    });

    el('volume').addEventListener('input', e => {
      el('volNum').textContent = e.target.value;
      api('/api/volume',{method:'POST',body:JSON.stringify({level:e.target.value})}).catch(()=>{});
    });

    function showCtrlMsg(msg) {
      controlError.textContent=msg;
      setTimeout(()=>controlError.textContent='',2000);
    }

    async function waitForIdle(timeout=4000,interval=120) {
      const t = Date.now();
      while(Date.now()-t<timeout) {
        try {
          const d = await api('/api/status');
          if((d.result?.status||'idle')==='idle') return true;
        } catch{}
        await new Promise(r=>setTimeout(r,interval));
      }
      return false;
    }

    /* ── Progress ─────────────────────────────── */
    progressInput.addEventListener('mousedown', ()=>isSeeking=true);
    progressInput.addEventListener('touchstart', ()=>isSeeking=true);
    progressInput.addEventListener('input', () => {
      curTimeEl.textContent = fmt(Number(progressInput.value));
    });
    progressInput.addEventListener('change', async () => {
      isSeeking=false;
      try { await api('/api/seek',{method:'POST',body:JSON.stringify({position:Number(progressInput.value)})}); }
      catch(err){ controlError.textContent=err.message; }
    });

    function setProgress(pos,dur) {
      if (!dur) {
        progressFill.style.width='0%';
        progressInput.max=0; progressInput.value=0; progressInput.disabled=true;
        curTimeEl.textContent=fmt(pos); totalTimeEl.textContent='—';
          return;
      }
      progressInput.disabled=false;
      progressInput.max=Math.floor(dur);
      if (!isSeeking) progressInput.value=Math.floor(Math.min(pos,dur));
      const pct = Math.min((pos/dur)*100,100).toFixed(2)+'%';
      progressFill.style.width=pct;
      curTimeEl.textContent=fmt(pos);
      totalTimeEl.textContent=fmt(dur);
    }

    /* ── rAF tick ─────────────────────────────── */
    let lastTickPos=-1, lastTickStatus='';
    let vizFrame=0;
    function tick(now) {
      requestAnimationFrame(tick);
      const elapsed = (Date.now()-lastUpdateTs)/1000;
      const proj = lastStatus==='playing' && !isSeeking ? lastPos+elapsed : lastPos;
      // Only update DOM if values changed meaningfully
      if (Math.abs(proj-lastTickPos)>0.1 || lastStatus!==lastTickStatus) {
        setProgress(proj, lastDur);
        lastTickPos=proj; lastTickStatus=lastStatus;
      }
      if (now-vizFrame>120) {
        animViz(lastStatus==='playing');
        vizFrame=now;
      }
    }
    requestAnimationFrame(tick);

    /* ── Status polling (adaptive) ────────────── */
    function setAdaptivePoll(status) {
      clearInterval(pollInterval);
      const interval = status==='playing' ? 1200 : status==='paused' ? 3000 : 5000;
      pollInterval = setInterval(refreshStatus, interval);
    }

    async function refreshStatus() {
      try {
        const d = await api('/api/status');
        const s = d.result||{};
        updatePlayerUI(s);
      } catch{}
    }

    function updatePlayerUI(s) {
      const st = s.status||'idle';
      const prevStatus = lastStatus;
      lastStatus=st;
      lastPos = s.position??0;
      lastDur = s.durationSeconds||s.meta?.durationSeconds||0;
      lastUpdateTs=Date.now();

      if (st!==prevStatus) {
        setAdaptivePoll(st);
        // Play/pause button
        playPauseBtn.innerHTML = st==='playing' ? '⏸' : '▶';
        // Dot indicator
        npDot.className='dot'+(st==='playing'?'':st==='paused'?' paused':' idle');
        npStatusText.textContent=st.toUpperCase();
      }
      if (s.meta?.id) playingId=s.meta.id;
      if (s.meta?.title && s.meta.title!==currentTitle) {
        currentTitle=s.meta.title||'';
        currentUploader=s.meta.uploader||'';
        currentThumb=s.meta.thumbnail||'';
        npTitle.textContent=currentTitle||'Nothing playing';
        npUploader.textContent=currentUploader;
        npThumbnail.src=currentThumb;
      }
      if (!s.meta) {
        npTitle.textContent='Nothing playing';
        npUploader.textContent='';
        currentTitle=''; currentUploader=''; currentThumb='';
      }
      // Auto-advance queue
      if (gqActive && prevStatus==='playing' && st==='idle' && !pendingId) {
        advanceQueue();
      }
    }

    /* ── Queue ────────────────────────────────── */
    function addToQueue(item) {
      if (generalQueue.some(t=>t.id===item.id)) return;
      generalQueue.push({id:item.id,title:item.title,uploader:item.uploader||'',duration:item.duration,thumbnail:item.thumbnail});
      renderQueuePanel();
      // Show queue tab briefly
      const stab = document.querySelector('[data-stab="queue"]');
      stab.textContent='Queue ('+generalQueue.length+')';
      setTimeout(()=>stab.textContent='Queue',2000);
    }

    function advanceQueue() {
      gqIdx++;
      if (gqIdx>=generalQueue.length) { gqActive=false; gqIdx=0; renderQueuePanel(); return; }
      renderQueuePanel();
      const next=generalQueue[gqIdx];
      if (next) internalPlay(next.id);
    }

    function renderQueuePanel() {
      sideQueue.innerHTML='';
      if (!generalQueue.length) {
        sideQueue.innerHTML='<div class="queue-empty">No songs in queue.<br><span style="font-size:10px">Press +Q on any result</span></div>';
        return;
      }
      const hdr=document.createElement('div');
      hdr.style.cssText='display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;';
      hdr.innerHTML=`<span style="font-size:11px;color:var(--text-3);font-family:var(--mono)">${generalQueue.length} track${generalQueue.length>1?'s':''}</span>`;
      const clearBtn=document.createElement('button'); clearBtn.className='btn btn-ghost btn-sm'; clearBtn.textContent='Clear';
      clearBtn.addEventListener('click',()=>{ generalQueue=[]; gqActive=false; gqIdx=0; renderQueuePanel(); });
      hdr.appendChild(clearBtn); sideQueue.appendChild(hdr);

      let dragSrc=null;
      const frag=document.createDocumentFragment();
      generalQueue.forEach((t,i)=>{
        const row=document.createElement('div');
        row.className='side-item'+(i===gqIdx&&gqActive?' active':'');
        row.draggable=true;

        // drag-and-drop events
        row.addEventListener('dragstart',e=>{ dragSrc=i; row.classList.add('dq-drag'); e.dataTransfer.effectAllowed='move'; });
        row.addEventListener('dragend',()=>{ row.classList.remove('dq-drag'); sideQueue.querySelectorAll('.dq-over').forEach(r=>r.classList.remove('dq-over')); });
        row.addEventListener('dragover',e=>{ e.preventDefault(); e.dataTransfer.dropEffect='move'; row.classList.add('dq-over'); });
        row.addEventListener('dragleave',()=>row.classList.remove('dq-over'));
        row.addEventListener('drop',e=>{
          e.preventDefault(); row.classList.remove('dq-over');
          if (dragSrc===null||dragSrc===i) return;
          const [moved]=generalQueue.splice(dragSrc,1);
          generalQueue.splice(i,0,moved);
          // adjust active index
          if (gqActive) {
            if (dragSrc===gqIdx) gqIdx=i;
            else if (dragSrc<gqIdx && i>=gqIdx) gqIdx--;
            else if (dragSrc>gqIdx && i<=gqIdx) gqIdx++;
          }
          // Notify backend of reorder (best-effort)
          (async ()=>{
            try {
              await api('/api/queue/reorder',{method:'POST',body:JSON.stringify({from:dragSrc,to:i})});
            } catch(e) { /* ignore */ }
          })();
          dragSrc=null; renderQueuePanel();
        });

        const handle=document.createElement('span'); handle.className='drag-handle'; handle.textContent='⠿';
        const num=document.createElement('span'); num.className='queue-num'; num.textContent=i+1;
        const img=document.createElement('img'); img.loading='lazy'; img.src=t.thumbnail||''; img.alt=''; img.width=48; img.height=28;
        const info=document.createElement('div'); info.className='side-item-info';
        const tt=document.createElement('div'); tt.className='side-item-title'; tt.textContent=t.title;
        const su=document.createElement('div'); su.className='side-item-sub'; su.textContent=t.uploader||'';
        info.append(tt,su);

        const acts=document.createElement('div'); acts.className='side-item-actions';
        const rm=document.createElement('button'); rm.className='btn-icon btn-sm'; rm.textContent='✕';
        rm.addEventListener('click',e=>{ e.stopPropagation(); generalQueue.splice(i,1); if(gqActive&&gqIdx>=i&&gqIdx>0)gqIdx--; if(!generalQueue.length){gqActive=false;gqIdx=0;} renderQueuePanel(); });
        acts.appendChild(rm);

        row.append(handle,num,img,info,acts);
        row.addEventListener('click',()=>{ gqIdx=i; gqActive=true; internalPlay(t.id); renderQueuePanel(); });
        frag.appendChild(row);
      });
      sideQueue.appendChild(frag);
    }

    /* ── Recommendations ──────────────────────── */
    async function loadRecs(title, uploader) {
      sideRecs.innerHTML='<div class="muted" style="font-size:11px;padding:8px">Loading…</div>';
      try {
        const d = await api(`/api/related?title=${encodeURIComponent(title)}&uploader=${encodeURIComponent(uploader||'')}&limit=50`);
        allRecs=d.results||[]; recsIdx=0;
        renderRecsChunk(true);
      } catch{
        sideRecs.innerHTML='<div class="muted" style="font-size:11px;padding:8px">No recommendations.</div>';
      }
    }

    function renderRecsChunk(clear=false) {
      if (clear) { sideRecs.innerHTML=''; recsIdx=0; }
      const slice=allRecs.slice(recsIdx, recsIdx+RECS_BATCH);
      const frag=document.createDocumentFragment();
      slice.forEach(item=>{
        const row=document.createElement('div'); row.className='side-item';
        const img=document.createElement('img'); img.loading='lazy'; img.src=item.thumbnail||''; img.alt=''; img.width=48; img.height=28;
        const info=document.createElement('div'); info.className='side-item-info';
        const tt=document.createElement('div'); tt.className='side-item-title'; tt.textContent=item.title||'';
        const su=document.createElement('div'); su.className='side-item-sub'; su.textContent=item.uploader||'';
        info.append(tt,su);
        const acts=document.createElement('div'); acts.className='side-item-actions';
        const pb=document.createElement('button'); pb.className='btn-icon btn-sm'; pb.textContent='▶';
        pb.addEventListener('click',e=>{ e.stopPropagation(); handlePlay(item.id, item); });
        const qb=document.createElement('button'); qb.className='btn-icon btn-sm'; qb.textContent='+Q';
        qb.addEventListener('click',e=>{ e.stopPropagation(); addToQueue(item); qb.textContent='✓'; qb.disabled=true; setTimeout(()=>{qb.textContent='+Q';qb.disabled=false;},1400); });
        acts.append(pb,qb);
        row.append(img,info,acts);
        row.addEventListener('click',()=>handlePlay(item.id,item));
        frag.appendChild(row);
      });
      sideRecs.appendChild(frag);
      recsIdx+=slice.length;
    }

    el('sideRecs').addEventListener('scroll', () => {
      const el2=el('sideRecs');
      if (el2.scrollTop+el2.clientHeight>=el2.scrollHeight-60 && recsIdx<allRecs.length) renderRecsChunk();
    });
    el('sideHistory').addEventListener('scroll', () => {});

    /* ── History ──────────────────────────────── */
    async function loadHistory() {
      try {
        const d=await api('/api/history');
        const h=d.history||[];
        sideHistory.innerHTML='';
        if (!h.length) { sideHistory.innerHTML='<div class="queue-empty">No history yet.</div>'; return; }
        const frag=document.createDocumentFragment();
        h.forEach(item=>{
          const row=document.createElement('div'); row.className='side-item';
          const info=document.createElement('div'); info.className='side-item-info';
          const tt=document.createElement('div'); tt.className='side-item-title'; tt.textContent=item.title;
          const su=document.createElement('div'); su.className='side-item-sub'; su.textContent=item.uploader||'';
          info.append(tt,su);
          const acts=document.createElement('div'); acts.className='side-item-actions';
          const pb=document.createElement('button'); pb.className='btn-icon btn-sm'; pb.textContent='▶';
          pb.addEventListener('click',e=>{ e.stopPropagation(); gqActive=false; handlePlay(item.id||item.title,item); });
          acts.appendChild(pb);
          row.append(info,acts);
          row.addEventListener('click',()=>{ gqActive=false; handlePlay(item.id||item.title,item); });
          frag.appendChild(row);
        });
        sideHistory.appendChild(frag);
      } catch{}
    }

    /* ── Playlist management ──────────────────── */
    async function loadPlaylists() {
      try {
        const d=await api('/api/playlists');
        playlists=d.playlists||[];
        renderPlaylists();
      } catch(err) {
        el('playlistList').innerHTML=`<span class="error">${esc(err.message)}</span>`;
      }
    }

    function renderPlaylists() {
      const container=el('playlistList');
      container.innerHTML='';
      if (!playlists.length) {
        container.innerHTML='<div class="muted" style="font-size:12px;padding:8px 0">No playlists yet. Create one above!</div>';
        return;
      }
      const frag=document.createDocumentFragment();
      playlists.forEach(pl=>{
        const card=document.createElement('div'); card.className='pl-card';
        const head=document.createElement('div'); head.className='pl-card-head';

        const nameBtn=document.createElement('button'); nameBtn.className='pl-card-name'; nameBtn.textContent=pl.name;
        nameBtn.title='Click to expand, double-click to rename';
        nameBtn.addEventListener('click',()=>togglePlExpand(pl.id));
        nameBtn.addEventListener('dblclick',()=>startRenamePl(pl.id,nameBtn));

        const count=document.createElement('span'); count.className='pl-count'; count.textContent=`${pl.trackCount} track${pl.trackCount!==1?'s':''}`;

        // Cover art — populated when tracks are loaded
        const coverEl=document.createElement('div'); coverEl.className='pl-cover-ph'; coverEl.textContent='🎵';
        coverEl.dataset.plid=pl.id;

        const actions=document.createElement('div'); actions.style.cssText='display:flex;gap:4px';
        const playBtn=document.createElement('button'); playBtn.className='btn btn-accent btn-sm'; playBtn.textContent='▶ Play';
        playBtn.addEventListener('click',e=>{ e.stopPropagation(); startPlaylistQueue(pl.id,'sequential'); });
        const shufBtn=document.createElement('button'); shufBtn.className='btn btn-ghost btn-sm'; shufBtn.textContent='🔀';
        shufBtn.addEventListener('click',e=>{ e.stopPropagation(); startPlaylistQueue(pl.id,'shuffle'); });
        const delBtn=document.createElement('button'); delBtn.className='btn btn-danger btn-sm'; delBtn.textContent='✕';
        delBtn.addEventListener('click',async e=>{ e.stopPropagation(); if(!confirm(`Delete "${pl.name}"?`))return; try{ await api(`/api/playlists/${pl.id}`,{method:'DELETE'}); await loadPlaylists(); }catch(err){alert(err.message);} });
        actions.append(playBtn,shufBtn,delBtn);

        head.append(coverEl,nameBtn,count,actions);
        card.appendChild(head);

        if (expandedPl===pl.id) {
          const tracks=document.createElement('div'); tracks.className='pl-tracks';
          tracks.innerHTML='<div class="muted" style="font-size:11px">Loading…</div>';
          card.appendChild(tracks);
          loadPlaylistTracks(pl.id,tracks,coverEl);
        }
        frag.appendChild(card);
      });
      container.appendChild(frag);
    }

    function togglePlExpand(id) { expandedPl=expandedPl===id?null:id; renderPlaylists(); }

    async function loadPlaylistTracks(id, container, coverEl) {
      try {
        const d=await api(`/api/playlists/${id}`);
        const tracks=d.playlist?.tracks||[];
        // Populate cover art with first track that has a thumbnail
        if (coverEl && tracks.length) {
          const first=tracks.find(t=>t.thumbnail);
          if (first) {
            const img=document.createElement('img'); img.className='pl-cover'; img.src=first.thumbnail; img.alt='';
            img.onerror=()=>{ img.replaceWith(coverEl); }; // fallback to placeholder on error
            coverEl.replaceWith(img);
          }
        }
        container.innerHTML='';
        if (!tracks.length) { container.innerHTML='<div class="muted" style="font-size:11px">No tracks.</div>'; return; }
        tracks.forEach((t,i)=>{
          const row=document.createElement('div'); row.className='pl-track';
          const n=document.createElement('span'); n.className='pl-track-num'; n.textContent=i+1;
          const tt=document.createElement('span'); tt.className='pl-track-title'; tt.textContent=t.title; tt.title=t.title;
          const up=document.createElement('span'); up.className='pl-track-up'; up.textContent=t.uploader||'';
          const pb=document.createElement('button'); pb.className='btn-icon btn-sm'; pb.textContent='▶';
          pb.addEventListener('click',()=>{ gqActive=false; handlePlay(t.id,t); });
          const rm=document.createElement('button'); rm.className='btn-icon btn-sm btn-danger'; rm.textContent='✕';
          rm.addEventListener('click',async()=>{ try{ await api(`/api/playlists/${id}/tracks/${t.id}`,{method:'DELETE'}); await loadPlaylists(); }catch(err){alert(err.message);} });
          row.append(n,tt,up,pb,rm);
          container.appendChild(row);
        });
      } catch(err){ container.innerHTML=`<span class="error">${esc(err.message)}</span>`; }
    }

    async function startRenamePl(id, nameBtn) {
      const pl=playlists.find(p=>p.id===id); if(!pl) return;
      const input=document.createElement('input'); input.className='pl-rename-input'; input.value=pl.name;
      input.addEventListener('blur',async()=>{
        const n=input.value.trim();
        if (n&&n!==pl.name) { try{ await api(`/api/playlists/${id}`,{method:'PATCH',body:JSON.stringify({name:n})}); await loadPlaylists(); }catch(err){alert(err.message);} }
        else renderPlaylists();
      });
      input.addEventListener('keydown',e=>{ if(e.key==='Enter') input.blur(); if(e.key==='Escape'){renderPlaylists();} });
      nameBtn.replaceWith(input); input.focus(); input.select();
    }

    el('createPlBtn').addEventListener('click', async()=>{
      const name=el('newPlName').value.trim(); if(!name) return;
      try{ await api('/api/playlists',{method:'POST',body:JSON.stringify({name})}); el('newPlName').value=''; await loadPlaylists(); }
      catch(err){alert(err.message);}
    });
    el('newPlName').addEventListener('keydown', e=>{ if(e.key==='Enter') el('createPlBtn').click(); });

    async function startPlaylistQueue(id, mode) {
      const d=await api(`/api/playlists/${id}`);
      const tracks=d.playlist?.tracks||[];
      if (!tracks.length) { alert('Playlist is empty!'); return; }
      generalQueue=tracks.map(t=>({id:t.id,title:t.title,uploader:t.uploader||'',duration:t.duration,thumbnail:t.thumbnail}));
      if (mode==='shuffle') shuffle(generalQueue);
      gqActive=true; gqIdx=0;
      renderQueuePanel();
      // Switch to queue tab to show it
      document.querySelector('[data-stab="queue"]').click();
      const first=generalQueue[0];
      if (first) internalPlay(first.id);
    }

    function shuffle(arr) { for(let i=arr.length-1;i>0;i--){ const j=Math.random()*(i+1)|0; [arr[i],arr[j]]=[arr[j],arr[i]]; } }

    /* ── AI Chat ──────────────────────────────── */
    const chatPanel=el('chatPanel');
    el('chatToggle').addEventListener('click',()=>{ chatPanel.classList.toggle('open'); });
    // Close on outside click
    document.addEventListener('click',e=>{
      if (!chatPanel.contains(e.target) && e.target!==el('chatToggle')) chatPanel.classList.remove('open');
    });

    async function sendChat() {
      const msg=el('chatInput').value.trim(); if(!msg) return;
      el('chatInput').value=''; el('chatSend').disabled=true;
      appendMsg('user',msg);
      const typing=appendMsg('ai','…typing',true);
      try {
        const r=await fetch('/api/chat',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({message:msg})});
        const d=await r.json();
        typing.remove();
        if (!d.ok) throw new Error(d.error||'AI request failed');
        const bubble=document.createElement('div'); bubble.className='msg ai';

        // Message text
        const msgDiv=document.createElement('div');
        msgDiv.style.marginBottom='8px';
        msgDiv.textContent=d.message||'';
        bubble.appendChild(msgDiv);

        // Suggestion rows: [play btn] [label] [+Q btn]
        const sugWrap=document.createElement('div');
        (d.suggestions||[]).forEach(s=>{
          const query=s.query||'';
          const row=document.createElement('div'); row.className='sug-row';

          const playBtn=document.createElement('button'); playBtn.className='sug-btn';
          playBtn.textContent=query; playBtn.title=s.reason||'';
          playBtn.addEventListener('click',async()=>{
            playBtn.disabled=true; playBtn.textContent='⏳ Loading…';
            qBtn.disabled=true;
            chatPanel.classList.remove('open');
            try {
              // Use handlePlay via a synthetic item so UI updates properly
              pendingId=query;
              npStatusText.textContent='LOADING'; npDot.className='dot';
              const resp=await api('/api/play',{method:'POST',body:JSON.stringify({query})});
              pendingId=null;
              playingId=resp.result?.meta?.id||null;
              if(resp.result?.meta){
                const m=resp.result.meta;
                currentTitle=m.title||query; currentUploader=m.uploader||''; currentThumb=m.thumbnail||'';
                npTitle.textContent=currentTitle; npUploader.textContent=currentUploader; npThumbnail.src=currentThumb;
                // Add to queue
                if(!generalQueue.some(t=>t.id===m.id)){
                  generalQueue.push({id:m.id,title:m.title,uploader:m.uploader||'',duration:m.duration,thumbnail:m.thumbnail});
                  gqIdx=generalQueue.length-1; gqActive=true; renderQueuePanel();
                }
              }
              setAdaptivePoll('playing');
              await refreshStatus();
              if(currentTitle) loadRecs(currentTitle,currentUploader);
              playBtn.textContent='✓ Playing';
            } catch(err){
              pendingId=null;
              playBtn.textContent=query; playBtn.disabled=false; qBtn.disabled=false;
              controlError.textContent=err.message;
            }
          });

          const qBtn=document.createElement('button'); qBtn.className='sug-q-btn'; qBtn.textContent='+Q';
          qBtn.title='Add to queue';
          qBtn.addEventListener('click',()=>{
            // Add as a queue item using the query string as a placeholder
            // It will resolve to real metadata when played
            const item={id:query,title:query,uploader:'',duration:null,thumbnail:''};
            if(!generalQueue.some(t=>t.id===query)){
              generalQueue.push(item); renderQueuePanel();
            }
            qBtn.textContent='✓'; qBtn.disabled=true;
            setTimeout(()=>{ qBtn.textContent='+Q'; qBtn.disabled=false; },1400);
          });

          row.append(playBtn,qBtn);
          sugWrap.appendChild(row);
        });
        bubble.appendChild(sugWrap);
        el('chatMsgs').appendChild(bubble);
      } catch(err){
        typing.remove();
        appendMsg('ai',`⚠ ${err.message}`);
      }
      el('chatSend').disabled=false;
      el('chatMsgs').scrollTop=9999;
    }

    function appendMsg(role, text, temp=false) {
      const div=document.createElement('div'); div.className='msg '+role;
      div.textContent=text;
      el('chatMsgs').appendChild(div);
      el('chatMsgs').scrollTop=9999;
      return div;
    }

    el('chatSend').addEventListener('click',sendChat);
    el('chatInput').addEventListener('keydown',e=>{ if(e.key==='Enter') sendChat(); });

    /* ═══════════════════════════════════════════
       FEATURE: Toast Notifications
    ═══════════════════════════════════════════ */
    function toast(msg, type='info', duration=2800) {
      const t = document.createElement('div');
      t.className = `toast ${type}`;
      const icons = { success:'✓', info:'♪', error:'⚠' };
      t.innerHTML = `<span>${icons[type]||'♪'}</span><span>${esc(msg)}</span>`;
      el('toastContainer').appendChild(t);
      setTimeout(()=>{
        t.classList.add('fade-out');
        t.addEventListener('animationend', ()=>t.remove(), { once:true });
      }, duration);
    }

    /* ═══════════════════════════════════════════
       FEATURE: Keyboard Shortcuts
    ═══════════════════════════════════════════ */
    let kbHintTimer = null;
    function flashKbHint(msg) {
      const h = el('kbHint'); h.textContent = msg; h.classList.add('visible');
      clearTimeout(kbHintTimer);
      kbHintTimer = setTimeout(()=>h.classList.remove('visible'), 1400);
    }
    document.addEventListener('keydown', e => {
      const tag = document.activeElement?.tagName?.toLowerCase();
      if (tag==='input'||tag==='textarea') return;
      if (e.ctrlKey||e.metaKey||e.altKey) return;
      switch(e.key) {
        case ' ': e.preventDefault(); playPauseBtn.click(); flashKbHint(lastStatus==='playing'?'Paused':'Playing'); break;
        case 'ArrowRight': e.preventDefault(); api('/api/seek',{method:'POST',body:JSON.stringify({position:Math.max(0,lastPos+10)})}).catch(()=>{}); flashKbHint('→ +10s'); break;
        case 'ArrowLeft':  e.preventDefault(); api('/api/seek',{method:'POST',body:JSON.stringify({position:Math.max(0,lastPos-10)})}).catch(()=>{}); flashKbHint('← -10s'); break;
        case 'ArrowUp':   e.preventDefault(); { const v=Math.min(100,Number(el('volume').value)+5); el('volume').value=v; el('volNum').textContent=v; api('/api/volume',{method:'POST',body:JSON.stringify({level:v})}).catch(()=>{}); flashKbHint(`🔊 ${v}%`); } break;
        case 'ArrowDown': e.preventDefault(); { const v=Math.max(0,Number(el('volume').value)-5); el('volume').value=v; el('volNum').textContent=v; api('/api/volume',{method:'POST',body:JSON.stringify({level:v})}).catch(()=>{}); flashKbHint(`🔉 ${v}%`); } break;
        case 'n': el('nextBtn').click(); flashKbHint('Next →'); break;
        case 'p': el('prevBtn').click(); flashKbHint('← Prev'); break;
        case 's': el('stopBtn').click(); flashKbHint('Stopped'); break;
        case 'l': el('lyricsToggle').click(); flashKbHint('Lyrics'); break;
        case '/': e.preventDefault(); el('searchInput').focus(); break;
      }
    });

    /* ═══════════════════════════════════════════
       FEATURE: Lyrics Panel
    ═══════════════════════════════════════════ */
    // Use `lyricsPanelFor` here to avoid clashing with the earlier `lyricsFor` used by
    // the synced-lyrics helper elsewhere in the file.
    let lyricsOpen=false, lyricsPanelFor='';
    el('lyricsToggle').addEventListener('click',()=>toggleLyrics());
    el('lyricsClose').addEventListener('click',()=>toggleLyrics(false));
    function toggleLyrics(force) {
      lyricsOpen=(force!==undefined)?force:!lyricsOpen;
      el('lyricsPanel').classList.toggle('open',lyricsOpen);
      el('sidebar').style.marginRight=lyricsOpen?'300px':'0';
      if (lyricsOpen && currentTitle && currentTitle!==lyricsPanelFor) fetchLyrics(currentTitle, currentUploader);
    }
    async function fetchLyrics(title, artist) {
      lyricsPanelFor=title;
      const body=el('lyricsBody');
      body.className='loading'; body.innerHTML='Searching for lyrics…';
      const cleanTitle=title.replace(/\(official.*?\)/gi,'').replace(/\[.*?\]/g,'').replace(/official (video|audio|lyric|music video)/gi,'').replace(/\s+/g,' ').trim();
      const cleanArtist=artist.replace(/\s*-\s*Topic$/,'').trim();
      try {
          // Prefer server-side lyrics proxy to avoid CORS and unify sources
          const r = await fetch(`/api/lyrics?artist=${encodeURIComponent(cleanArtist)}&title=${encodeURIComponent(cleanTitle)}`);
          if (!r.ok) throw new Error('not found');
          const d = await r.json();
          if (!d.ok || !d.lyrics) throw new Error('no lyrics');
          body.className='';
          body.innerHTML=`<div class="lyrics-title">${esc(cleanTitle)}</div><div class="lyrics-artist">${esc(cleanArtist)}</div>${esc(d.lyrics)}`;
      } catch {
        try {
          const r2=await fetch(`https://api.lyrics.ovh/v1/${encodeURIComponent(cleanArtist)}/${encodeURIComponent(cleanTitle)}`);
          const d2=await r2.json();
          if (!d2.lyrics) throw new Error('none');
          body.className='';
          body.innerHTML=`<div class="lyrics-title">${esc(cleanTitle)}</div><div class="lyrics-artist">${esc(cleanArtist)}</div>${esc(d2.lyrics)}`;
        } catch {
          body.className='error'; body.textContent='Lyrics not found for this track.';
        }
      }
    }

    /* ═══════════════════════════════════════════
       FEATURE: Recently Played Strip
    ═══════════════════════════════════════════ */
    function renderRecentStrip() {
      const strip=el('recentStrip'), cards=el('recentCards');
      const recentItems=window._recentCache||[];
      if (!recentItems.length||el('searchInput').value.trim()) { strip.classList.remove('visible'); return; }
      strip.classList.add('visible');
      cards.innerHTML='';
      const frag=document.createDocumentFragment();
      recentItems.slice(0,10).forEach(item=>{
        const card=document.createElement('div'); card.className='recent-card'; card.title=item.title;
        const img=document.createElement('img'); img.loading='lazy'; img.src=item.thumbnail||''; img.alt=''; img.width=108; img.height=60;
        const info=document.createElement('div'); info.className='recent-card-info';
        const tt=document.createElement('div'); tt.className='recent-card-title'; tt.textContent=item.title||'';
        const up=document.createElement('div'); up.className='recent-card-up'; up.textContent=item.uploader||'';
        info.append(tt,up); card.append(img,info);
        card.addEventListener('click',()=>handlePlay(item.id,item));
        frag.appendChild(card);
      });
      cards.appendChild(frag);
    }

    /* ═══════════════════════════════════════════
       FEATURE: Search History Dropdown
    ═══════════════════════════════════════════ */
    // Use a separate variable to avoid colliding with the earlier `searchHistory` variable
    let resonSearchHistory=JSON.parse(localStorage.getItem('reson_search_history')||'[]');
    function saveSearchToHistory(q) {
      resonSearchHistory=[q,...resonSearchHistory.filter(s=>s!==q)].slice(0,12);
      localStorage.setItem('reson_search_history',JSON.stringify(resonSearchHistory));
    }
    function renderSearchHistoryDrop(filter='') {
      const drop=el('searchHistoryDrop');
      const items=filter?resonSearchHistory.filter(s=>s.toLowerCase().includes(filter.toLowerCase())):resonSearchHistory;
      if (!items.length){drop.classList.remove('visible');return;}
      drop.innerHTML='';
      items.slice(0,8).forEach(q=>{
        const row=document.createElement('div'); row.className='sh-item';
        const icon=document.createElement('span'); icon.className='sh-item-icon'; icon.textContent='🕐';
        const text=document.createElement('span'); text.className='sh-item-text'; text.textContent=q;
        const del=document.createElement('button'); del.className='sh-item-del'; del.textContent='✕';
        del.addEventListener('click',e=>{ e.stopPropagation(); resonSearchHistory=resonSearchHistory.filter(s=>s!==q); localStorage.setItem('reson_search_history',JSON.stringify(resonSearchHistory)); renderSearchHistoryDrop(filter); });
        row.append(icon,text,del);
        row.addEventListener('click',e=>{ e.stopPropagation(); el('searchInput').value=q; drop.classList.remove('visible'); clearTimeout(searchDebounce); doSearch(); });
        drop.appendChild(row);
      });
      drop.classList.add('visible');
    }
    el('searchInput').addEventListener('focus',()=>{ if(!el('searchInput').value.trim()) renderSearchHistoryDrop(''); });
    document.addEventListener('click',e=>{ if(!el('searchBar').contains(e.target)) el('searchHistoryDrop').classList.remove('visible'); });
    // Intercept doSearch to save queries
    // Authoritative doSearch — adds search history saving
    async function doSearch() {
      const q=el('searchInput').value.trim();
      if(q){ saveSearchToHistory(q); el('searchHistoryDrop').classList.remove('visible'); }
      el('recentStrip').classList.remove('visible');
      if (!q) return;
      const seq=++searchSeq;
      el('searchSpinner').style.display='block'; el('searchClear').style.display='none';
      try {
        const d=await api(`/api/search?q=${encodeURIComponent(q)}&limit=30`);
        if(seq!==searchSeq) return;
        results=d.results||[]; page=0; renderResults();
      } catch(err) {
        if(seq!==searchSeq) return;
        resultsEl.innerHTML=`<div class="error" style="padding:12px">${esc(err.message)}</div>`;
      } finally {
        if(seq===searchSeq){ el('searchSpinner').style.display='none'; el('searchClear').style.display=''; }
      }
    }
    // Show/hide strip on input
    el('searchInput').addEventListener('input',()=>{
      const hasQ=el('searchInput').value.trim().length>0;
      if(!hasQ) { loadHistory(); }
      if(hasQ) { const q=el('searchInput').value.trim(); renderSearchHistoryDrop(q); }
    },{capture:true});

    /* ═══════════════════════════════════════════
       FEATURE: Queue Drag-and-Drop Reorder
    ═══════════════════════════════════════════ */
    let dragSrcIdx=null;
    // Authoritative renderQueuePanel with drag-and-drop
    function renderQueuePanel() {
      sideQueue.innerHTML='';
      if (!generalQueue.length) {
        sideQueue.innerHTML='<div class="queue-empty">No songs in queue.<br><span style="font-size:10px">Press +Q on any result</span></div>';
        return;
      }
      const hdr=document.createElement('div');
      hdr.style.cssText='display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;';
      hdr.innerHTML=`<span style="font-size:11px;color:var(--text-3);font-family:var(--mono)">${generalQueue.length} track${generalQueue.length>1?'s':''} — drag to reorder</span>`;
      const clearBtn=document.createElement('button'); clearBtn.className='btn btn-ghost btn-sm'; clearBtn.textContent='Clear';
      clearBtn.addEventListener('click',()=>{ generalQueue=[]; gqActive=false; gqIdx=0; renderQueuePanel(); });
      hdr.appendChild(clearBtn); sideQueue.appendChild(hdr);
      const frag=document.createDocumentFragment();
      generalQueue.forEach((t,i)=>{
        const row=document.createElement('div');
        row.className='side-item'+(i===gqIdx&&gqActive?' active':'');
        row.draggable=true; row.dataset.idx=i;
        row.addEventListener('dragstart',e=>{ dragSrcIdx=i; row.classList.add('dragging'); e.dataTransfer.effectAllowed='move'; });
        row.addEventListener('dragend',()=>{ dragSrcIdx=null; document.querySelectorAll('.side-item.drag-over,.side-item.dragging').forEach(r=>r.classList.remove('drag-over','dragging')); });
        row.addEventListener('dragover',e=>{ e.preventDefault(); document.querySelectorAll('.side-item.drag-over').forEach(r=>r.classList.remove('drag-over')); row.classList.add('drag-over'); });
        row.addEventListener('drop',e=>{
          e.preventDefault();
          if(dragSrcIdx===null||dragSrcIdx===i) return;
          const mv=generalQueue.splice(dragSrcIdx,1)[0]; generalQueue.splice(i,0,mv);
          if(gqIdx===dragSrcIdx) gqIdx=i;
          else if(dragSrcIdx<i&&gqIdx>dragSrcIdx&&gqIdx<=i) gqIdx--;
          else if(dragSrcIdx>i&&gqIdx>=i&&gqIdx<dragSrcIdx) gqIdx++;
          renderQueuePanel();
        });
        const num=document.createElement('span'); num.className='queue-num'; num.textContent=i+1; num.title='Drag to reorder'; num.style.cursor='grab';
        const img=document.createElement('img'); img.loading='lazy'; img.src=t.thumbnail||''; img.alt=''; img.width=48; img.height=28;
        const info=document.createElement('div'); info.className='side-item-info';
        const tt=document.createElement('div'); tt.className='side-item-title'; tt.textContent=t.title;
        const su=document.createElement('div'); su.className='side-item-sub'; su.textContent=t.uploader||'';
        info.append(tt,su);
        const acts=document.createElement('div'); acts.className='side-item-actions';
        const rm=document.createElement('button'); rm.className='btn-icon btn-sm'; rm.textContent='✕';
        rm.addEventListener('click',e=>{ e.stopPropagation(); generalQueue.splice(i,1); if(gqActive&&gqIdx>=i&&gqIdx>0)gqIdx--; if(!generalQueue.length){gqActive=false;gqIdx=0;} renderQueuePanel(); });
        acts.appendChild(rm);
        row.append(num,img,info,acts);
        row.addEventListener('click',()=>{ gqIdx=i; gqActive=true; internalPlay(t.id); renderQueuePanel(); });
        frag.appendChild(row);
      });
      sideQueue.appendChild(frag);
    }

    /* ═══════════════════════════════════════════
       FEATURE: Playlist Cover Art
    ═══════════════════════════════════════════ */
    // Authoritative renderPlaylists with cover art
    function renderPlaylists() {
      const container=el('playlistList'); container.innerHTML='';
      if (!playlists.length) { container.innerHTML='<div style="color:var(--text-3);font-size:12px;padding:12px 0">No playlists yet. Create one above.</div>'; return; }
      playlists.forEach(pl=>{
        const card=document.createElement('div'); card.className='pl-card';
        const head=document.createElement('div'); head.className='pl-card-head';
        const firstThumb=pl.tracks?.[0]?.thumbnail||'';
        if (firstThumb) {
          const img=document.createElement('img'); img.className='pl-cover'; img.loading='lazy'; img.src=firstThumb; img.alt=''; head.appendChild(img);
        } else {
          const ph=document.createElement('div'); ph.className='pl-cover-placeholder'; ph.textContent='♪'; head.appendChild(ph);
        }
        const nameBtn=document.createElement('button'); nameBtn.className='pl-card-name'; nameBtn.textContent=pl.name;
        nameBtn.addEventListener('click',()=>{ expandedPl=(expandedPl===pl.id)?null:pl.id; renderPlaylists(); });
        nameBtn.addEventListener('dblclick',e=>{ e.stopPropagation(); startRenamePl(pl.id,nameBtn); });
        const count=document.createElement('span'); count.className='pl-count'; count.textContent=`${pl.tracks?.length||0} tracks`;
        const actWrap=document.createElement('div'); actWrap.style.cssText='display:flex;gap:4px;';
        const playBtn=document.createElement('button'); playBtn.className='btn btn-accent btn-sm'; playBtn.textContent='▶';
        playBtn.addEventListener('click',e=>{e.stopPropagation();startPlaylistQueue(pl.id,'in-order');});
        const shufBtn=document.createElement('button'); shufBtn.className='btn btn-ghost btn-sm'; shufBtn.textContent='⇌'; shufBtn.title='Shuffle';
        shufBtn.addEventListener('click',e=>{e.stopPropagation();startPlaylistQueue(pl.id,'shuffle');});
        const delBtn=document.createElement('button'); delBtn.className='btn btn-danger btn-sm'; delBtn.textContent='✕';
        delBtn.addEventListener('click',async e=>{ e.stopPropagation(); if(!confirm(`Delete "${pl.name}"?`))return; try{await api(`/api/playlists/${pl.id}`,{method:'DELETE'});await loadPlaylists();}catch(err){alert(err.message);} });
        actWrap.append(playBtn,shufBtn,delBtn);
        head.append(nameBtn,count,actWrap);
        card.appendChild(head);
        if (expandedPl===pl.id) {
          const tracks=document.createElement('div'); tracks.className='pl-tracks';
          loadPlaylistTracks(pl.id,tracks); card.appendChild(tracks);
        }
        container.appendChild(card);
      });
    }

    /* ═══════════════════════════════════════════
       FEATURE: Equalizer Presets
    ═══════════════════════════════════════════ */
    let activeEqPreset='flat';
    el('eqToggle').addEventListener('click',e=>{ e.stopPropagation(); el('eqPanel').classList.toggle('open'); });
    document.addEventListener('click',e=>{ if(!el('eqWrap').contains(e.target)) el('eqPanel').classList.remove('open'); });
    document.querySelectorAll('.eq-preset').forEach(btn=>{
      btn.addEventListener('click',async()=>{
        const preset=btn.dataset.preset;
        document.querySelectorAll('.eq-preset').forEach(b=>b.classList.remove('active'));
        btn.classList.add('active'); activeEqPreset=preset; el('eqPanel').classList.remove('open');
        try {
          await api('/api/equalizer',{method:'POST',body:JSON.stringify({preset})});
          const labels={flat:'Flat',bass_boost:'Bass Boost',vocal:'Vocal',treble:'Treble',loud:'Loud'};
          toast(`EQ: ${labels[preset]||preset}`,'info');
        } catch(err){ toast(`EQ: ${err.message}`,'error'); }
      });
    });

    // Authoritative handlePlay with toast + lyrics
    async function handlePlay(id, itemMeta) {
      if (pendingId) return;
      controlError.textContent='';
      pendingId = id;
      if (itemMeta?.title) setTimeout(()=>toast(`♪ ${itemMeta.title}`,'success'), 300);
      if (itemMeta) {
        npTitle.textContent=itemMeta.title||'Loading…';
        npUploader.textContent=itemMeta.uploader||'';
        npThumbnail.src=itemMeta.thumbnail||'';
        currentTitle=itemMeta.title||''; currentUploader=itemMeta.uploader||''; currentThumb=itemMeta.thumbnail||'';
      }
      npStatusText.textContent='LOADING'; npDot.className='dot';
      const existing=generalQueue.findIndex(t=>t.id===id);
      if (existing===-1&&itemMeta) {
        generalQueue.push({id:itemMeta.id,title:itemMeta.title,uploader:itemMeta.uploader||'',duration:itemMeta.duration,thumbnail:itemMeta.thumbnail});
        gqIdx=generalQueue.length-1;
      } else if (existing!==-1) { gqIdx=existing; }
      gqActive=true; renderQueuePanel();
      try {
        const resp=await api('/api/play',{method:'POST',body:JSON.stringify({id})});
        playingId=id;
        if (resp.result?.meta) {
          const m=resp.result.meta;
          currentTitle=m.title||''; currentUploader=m.uploader||''; currentThumb=m.thumbnail||'';
          npTitle.textContent=currentTitle; npUploader.textContent=currentUploader; npThumbnail.src=currentThumb;
        }
        setAdaptivePoll('playing');
        if (currentTitle) loadRecs(currentTitle,currentUploader);
        loadHistory();
        if (lyricsOpen && currentTitle && currentTitle!==lyricsPanelFor) fetchLyrics(currentTitle,currentUploader);
      } catch(err) {
        controlError.textContent=err.message; npStatusText.textContent='ERROR';
      } finally {
        pendingId=null;
        if (results.length) renderResults();
      }
    }

    // Authoritative loadHistory — populates sidebar + recent strip
    async function loadHistory() {
      try {
        const d=await api('/api/history');
        const h=d.history||[];
        window._recentCache=h;
        if(!el('searchInput').value.trim()) renderRecentStrip();
        sideHistory.innerHTML='';
        if (!h.length){sideHistory.innerHTML='<div class="queue-empty">No history yet.</div>';return;}
        const frag=document.createDocumentFragment();
        h.forEach(item=>{
          const row=document.createElement('div'); row.className='side-item';
          const info=document.createElement('div'); info.className='side-item-info';
          const tt=document.createElement('div'); tt.className='side-item-title'; tt.textContent=item.title;
          const su=document.createElement('div'); su.className='side-item-sub'; su.textContent=item.uploader||'';
          info.append(tt,su);
          const acts=document.createElement('div'); acts.className='side-item-actions';
          const pb=document.createElement('button'); pb.className='btn-icon btn-sm'; pb.textContent='▶';
          pb.addEventListener('click',e=>{e.stopPropagation();handlePlay(item.id,item);});
          const qb=document.createElement('button'); qb.className='btn-icon btn-sm'; qb.textContent='+Q';
          qb.addEventListener('click',e=>{e.stopPropagation();addToQueue(item);qb.textContent='✓';qb.disabled=true;setTimeout(()=>{qb.textContent='+Q';qb.disabled=false;},1400);});
          acts.append(pb,qb);
          row.append(info,acts);
          row.addEventListener('click',()=>handlePlay(item.id,item));
          frag.appendChild(row);
        });
        sideHistory.appendChild(frag);
      } catch{}
    }

    /* ── Boot ─────────────────────────────────── */
    refreshStatus();
    loadPlaylists();
    loadHistory();
    setAdaptivePoll('idle');
    setInterval(()=>{ if(!document.hidden) loadHistory(); }, 15000);
    renderQueuePanel();
    </script>
  </body>
</html>

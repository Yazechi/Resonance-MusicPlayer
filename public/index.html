<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Resonance</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,300&display=swap" rel="stylesheet" />
    <style>
      :root {
        --bg:        #0a0a0f;
        --surface:   #111118;
        --surface-2: #16161f;
        --surface-3: #1c1c28;
        --accent:    #e8ff5a;
        --accent-dim: rgba(232,255,90,0.12);
        --accent-glow: rgba(232,255,90,0.2);
        --red:       #ff4f64;
        --teal:      #00d4b1;
        --text:      #f0f0f8;
        --text-2:    #9494b0;
        --text-3:    #5a5a72;
        --border:    rgba(255,255,255,0.06);
        --border-2:  rgba(255,255,255,0.1);
        --r:         8px;
        --r-sm:      5px;
        --r-lg:      14px;
        --mono: 'Space Mono', monospace;
        --sans: 'DM Sans', sans-serif;
      }
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

      body {
        font-family: var(--sans);
        background: var(--bg);
        color: var(--text);
        font-size: 13px;
        line-height: 1.5;
        min-height: 100vh;
        /* subtle noise texture */
        background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.025'/%3E%3C/svg%3E");
      }

      ::-webkit-scrollbar { width: 4px; height: 4px; }
      ::-webkit-scrollbar-track { background: transparent; }
      ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.08); border-radius: 2px; }
      ::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.14); }

      /* ── Layout shell ─────────────────────── */
      #app {
        display: grid;
        grid-template-rows: auto 1fr;
        min-height: 100vh;
      }

      /* ── Top bar ─────────────────────────── */
      #topbar {
        display: flex;
        align-items: center;
        gap: 14px;
        padding: 12px 20px;
        border-bottom: 1px solid var(--border);
        background: rgba(10,10,15,0.9);
        backdrop-filter: blur(12px);
        position: sticky;
        top: 0;
        z-index: 100;
      }
      #logo {
        font-family: var(--mono);
        font-size: 15px;
        font-weight: 700;
        color: var(--accent);
        letter-spacing: -0.04em;
        flex-shrink: 0;
        display: flex;
        align-items: center;
        gap: 6px;
      }
      #logo::before {
        content: '';
        width: 8px; height: 8px;
        border-radius: 50%;
        background: var(--accent);
        box-shadow: 0 0 10px var(--accent);
        animation: pulse-dot 2s ease-in-out infinite;
      }
      @keyframes pulse-dot {
        0%,100% { opacity:1; transform:scale(1); }
        50% { opacity:0.5; transform:scale(0.7); }
      }
      #searchBar {
        flex: 1;
        max-width: 480px;
        position: relative;
      }
      #searchBar input {
        width: 100%;
        padding: 8px 36px 8px 14px;
        background: var(--surface-2);
        border: 1px solid var(--border);
        border-radius: 999px;
        color: var(--text);
        font-family: var(--sans);
        font-size: 13px;
        outline: none;
        transition: border-color 150ms, box-shadow 150ms;
      }
      #searchBar input::placeholder { color: var(--text-3); }
      #searchBar input:focus {
        border-color: rgba(232,255,90,0.4);
        box-shadow: 0 0 0 3px rgba(232,255,90,0.08);
      }
      #searchClear {
        position: absolute; right: 12px; top: 50%; transform: translateY(-50%);
        background: none; border: none; color: var(--text-3); cursor: pointer;
        font-size: 14px; padding: 0; line-height: 1;
        opacity: 0; pointer-events: none; transition: opacity 150ms;
      }
      #searchBar input:not(:placeholder-shown) + #searchClear {
        opacity: 1; pointer-events: all;
      }
      #searchSpinner {
        position: absolute; right: 10px; top: 50%; transform: translateY(-50%);
        display: none;
      }
      .spinner-sm {
        width: 14px; height: 14px;
        border: 2px solid rgba(255,255,255,0.08);
        border-top-color: var(--accent);
        border-radius: 50%;
        animation: spin 0.6s linear infinite;
        display: inline-block;
      }
      @keyframes spin { to { transform: rotate(360deg); } }
      #topBarRight {
        display: flex; gap: 6px; align-items: center; margin-left: auto;
      }

      /* ── Tab nav ─────────────────────────── */
      #tabNav {
        display: flex;
        gap: 2px;
        background: var(--surface);
        border-radius: 999px;
        padding: 3px;
      }
      .tab-btn {
        padding: 5px 14px;
        border-radius: 999px;
        border: none;
        background: none;
        color: var(--text-2);
        font-family: var(--sans);
        font-size: 12px;
        font-weight: 500;
        cursor: pointer;
        transition: all 150ms;
        white-space: nowrap;
      }
      .tab-btn.active {
        background: var(--surface-3);
        color: var(--text);
      }
      .tab-btn:hover:not(.active) { color: var(--text); }

      /* ── Main content area ───────────────── */
      #main {
        display: grid;
        grid-template-columns: 1fr 300px;
        gap: 0;
        height: calc(100vh - 57px);
        overflow: hidden;
      }
      @media (max-width: 900px) {
        #main { grid-template-columns: 1fr; }
        #sidebar { display: none; }
      }

      /* ── Left panel (tabs) ───────────────── */
      #leftPanel {
        overflow-y: auto;
        padding: 16px 20px 80px;
        border-right: 1px solid var(--border);
      }

      /* ── Views ───────────────────────────── */
      .view { display: none; }
      .view.active { display: block; }

      /* ── Search results ──────────────────── */
      #resultsCount {
        font-size: 11px;
        color: var(--text-3);
        font-family: var(--mono);
        margin-bottom: 10px;
        display: flex;
        align-items: center;
        gap: 8px;
      }
      #resultsCount .bar { flex:1; height:1px; background:var(--border); }

      .result-row {
        display: flex;
        gap: 10px;
        align-items: center;
        padding: 8px 10px;
        border-radius: var(--r);
        cursor: pointer;
        transition: background 120ms;
        margin-bottom: 2px;
        position: relative;
      }
      .result-row:hover { background: var(--surface-2); }
      .result-row.playing { background: var(--accent-dim); }
      .result-row img {
        width: 68px; height: 38px;
        object-fit: cover;
        border-radius: var(--r-sm);
        background: var(--surface-3);
        flex-shrink: 0;
      }
      .result-info { flex: 1; min-width: 0; }
      .result-title {
        font-weight: 500;
        font-size: 13px;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      .result-meta {
        color: var(--text-3);
        font-size: 11px;
        display: flex; gap: 6px; align-items: center;
      }
      .result-meta .dur {
        font-family: var(--mono);
        font-size: 10px;
        background: var(--surface-3);
        padding: 1px 5px;
        border-radius: 3px;
      }
      .result-actions {
        display: flex;
        gap: 4px;
        opacity: 0;
        transition: opacity 120ms;
        flex-shrink: 0;
      }
      .result-row:hover .result-actions { opacity: 1; }
      .result-row.playing .result-actions { opacity: 1; }

      /* ── Buttons ─────────────────────────── */
      .btn {
        display: inline-flex; align-items: center; gap: 4px;
        padding: 5px 10px;
        border-radius: var(--r-sm);
        border: none;
        cursor: pointer;
        font-family: var(--sans);
        font-size: 11px;
        font-weight: 500;
        transition: all 120ms;
        white-space: nowrap;
      }
      .btn:disabled { opacity: 0.35; cursor: not-allowed; }
      .btn-accent {
        background: var(--accent);
        color: #0a0a0f;
        font-weight: 700;
      }
      .btn-accent:hover:not(:disabled) { filter: brightness(1.1); }
      .btn-ghost {
        background: rgba(255,255,255,0.06);
        color: var(--text-2);
      }
      .btn-ghost:hover:not(:disabled) {
        background: rgba(255,255,255,0.1);
        color: var(--text);
      }
      .btn-danger {
        background: rgba(255,79,100,0.12);
        color: var(--red);
      }
      .btn-danger:hover:not(:disabled) { background: rgba(255,79,100,0.2); }
      .btn-icon {
        padding: 5px 7px;
        font-size: 13px;
        background: rgba(255,255,255,0.06);
        color: var(--text-2);
        border-radius: var(--r-sm);
        border: none;
        cursor: pointer;
        transition: all 120ms;
      }
      .btn-icon:hover:not(:disabled) {
        background: rgba(255,255,255,0.12);
        color: var(--text);
      }
      .btn-icon:disabled { opacity: 0.35; cursor: not-allowed; }
      .btn-sm { padding: 3px 8px; font-size: 10px; }

      /* ── Dropdown menu ───────────────────── */
      .dropdown-wrap { position: relative; display: inline-block; }
      .dropdown-menu {
        position: absolute; top: calc(100% + 4px); right: 0;
        z-index: 200;
        background: var(--surface-3);
        border: 1px solid var(--border-2);
        border-radius: var(--r);
        min-width: 160px;
        max-height: 200px;
        overflow-y: auto;
        box-shadow: 0 8px 24px rgba(0,0,0,0.5);
        padding: 4px;
      }
      .dropdown-item {
        display: block; width: 100%; text-align: left;
        padding: 7px 10px;
        font-size: 12px; font-family: var(--sans);
        background: none; border: none;
        color: var(--text); cursor: pointer;
        border-radius: var(--r-sm);
        transition: background 100ms;
      }
      .dropdown-item:hover { background: rgba(232,255,90,0.08); color: var(--accent); }

      /* ── Sidebar (right) ─────────────────── */
      #sidebar {
        display: flex;
        flex-direction: column;
        overflow: hidden;
        background: var(--surface);
      }

      /* ── Now Playing (sidebar top) ───────── */
      #nowPlayingCard {
        flex-shrink: 0;
        padding: 16px;
        border-bottom: 1px solid var(--border);
        background: var(--surface);
      }
      #npThumbnail {
        width: 100%;
        height: 150px;
        object-fit: cover;
        border-radius: var(--r);
        background: var(--surface-3);
        margin-bottom: 12px;
        display: block;
      }
      #npLabel {
        font-family: var(--mono);
        font-size: 9px;
        font-weight: 700;
        letter-spacing: 0.1em;
        color: var(--accent);
        text-transform: uppercase;
        margin-bottom: 6px;
        display: flex;
        align-items: center;
        gap: 6px;
      }
      #npLabel .dot {
        width: 6px; height: 6px;
        border-radius: 50%;
        background: var(--accent);
        animation: pulse-dot 1.5s ease-in-out infinite;
        flex-shrink: 0;
      }
      #npLabel .dot.paused { animation: none; opacity: 0.4; }
      #npLabel .dot.idle { background: var(--text-3); animation: none; }
      #npTitle {
        font-size: 14px;
        font-weight: 600;
        line-height: 1.3;
        margin-bottom: 2px;
        display: -webkit-box;
        -webkit-line-clamp: 2;
        line-clamp:2;
        -webkit-box-orient: vertical;
        overflow: hidden;
      }
      #npUploader { color: var(--text-2); font-size: 11px; margin-bottom: 10px; }

      /* Progress */
      .progress-row {
        display: flex;
        align-items: center;
        gap: 8px;
        margin-bottom: 10px;
      }
      .time-label {
        font-family: var(--mono);
        font-size: 10px;
        color: var(--text-3);
        min-width: 30px;
        flex-shrink: 0;
      }
      .time-label.right { text-align: right; }
      input[type="range"] {
        -webkit-appearance: none; appearance: none;
        background: transparent; width: 100%; cursor: pointer;
      }
      input[type="range"]::-webkit-slider-runnable-track {
        height: 3px; border-radius: 2px;
        background: rgba(255,255,255,0.08);
      }
      input[type="range"]::-webkit-slider-thumb {
        -webkit-appearance: none; appearance: none;
        width: 12px; height: 12px;
        border-radius: 50%;
        background: var(--accent);
        margin-top: -4.5px;
        transition: transform 120ms;
      }
      input[type="range"]:hover::-webkit-slider-thumb { transform: scale(1.3); }
      input[type="range"]::-moz-range-track {
        height: 3px; border-radius: 2px;
        background: rgba(255,255,255,0.08);
      }
      input[type="range"]::-moz-range-thumb {
        width: 12px; height: 12px;
        border-radius: 50%;
        background: var(--accent); border: none; cursor: pointer;
      }
      #progressTrack {
        flex: 1;
        height: 3px;
        border-radius: 2px;
        background: rgba(255,255,255,0.08);
        position: relative;
        cursor: pointer;
        display: flex;
        align-items: center;
      }
      #progressFill {
        position: absolute; left: 0; top: 0; bottom: 0;
        background: var(--accent);
        border-radius: 2px;
        pointer-events: none;
        transition: width 200ms linear;
      }
      #progressInput {
        position: absolute; inset: -6px 0;
        opacity: 0; cursor: pointer;
        width: 100%;
      }

      /* Controls */
      .ctrl-row {
        display: flex; gap: 6px; align-items: center;
        margin-bottom: 10px;
      }
      .ctrl-row .spacer { flex: 1; }
      .btn-ctrl {
        width: 32px; height: 32px;
        border-radius: 50%;
        border: none;
        display: flex; align-items: center; justify-content: center;
        font-size: 14px;
        cursor: pointer;
        transition: all 120ms;
        flex-shrink: 0;
      }
      .btn-ctrl.play-pause {
        width: 40px; height: 40px;
        background: var(--accent);
        color: #0a0a0f;
        font-size: 16px;
      }
      .btn-ctrl.play-pause:hover { filter: brightness(1.15); transform: scale(1.05); }
      .btn-ctrl.secondary {
        background: rgba(255,255,255,0.06);
        color: var(--text-2);
      }
      .btn-ctrl.secondary:hover { background: rgba(255,255,255,0.1); color: var(--text); }
      .btn-ctrl:disabled { opacity: 0.3; cursor: not-allowed; }
      .vol-row {
        display: flex; gap: 8px; align-items: center;
        font-size: 11px; color: var(--text-3);
      }
      .vol-row input[type="range"] { flex: 1; }
      #controlError {
        color: var(--red);
        font-size: 11px;
        min-height: 16px;
        margin-top: 2px;
      }

      /* Visualizer (tiny bars in label area) */
      #vizBars {
        display: flex;
        gap: 2px;
        align-items: flex-end;
        height: 14px;
      }
      .vb {
        width: 3px;
        background: var(--accent);
        border-radius: 1px;
        height: 3px;
        transition: height 180ms ease;
        opacity: 0.6;
      }

      /* ── Sidebar tabs ─────────────────────── */
      #sidebarTabs {
        display: flex;
        border-bottom: 1px solid var(--border);
        flex-shrink: 0;
      }
      .stab {
        flex: 1; padding: 9px 0; text-align: center;
        font-size: 11px; font-weight: 500; color: var(--text-3);
        border: none; background: none; cursor: pointer;
        border-bottom: 2px solid transparent;
        transition: all 150ms; font-family: var(--sans);
      }
      .stab.active { color: var(--accent); border-bottom-color: var(--accent); }
      .stab:hover:not(.active) { color: var(--text-2); }

      #sidebarContent { flex: 1; overflow-y: auto; padding: 12px; }

      /* ── Recs / History / Queue items ──── */
      .side-item {
        display: flex; gap: 8px; align-items: center;
        padding: 6px;
        border-radius: var(--r-sm);
        cursor: pointer;
        transition: background 120ms;
        margin-bottom: 2px;
      }
      .side-item:hover { background: var(--surface-2); }
      .side-item.active { background: var(--accent-dim); }
      .side-item img {
        width: 48px; height: 28px;
        object-fit: cover; border-radius: 3px;
        background: var(--surface-3); flex-shrink: 0;
      }
      .side-item-info { flex: 1; min-width: 0; }
      .side-item-title {
        font-size: 12px; font-weight: 500;
        white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      }
      .side-item-sub { font-size: 10px; color: var(--text-3); }
      .side-item-actions { opacity: 0; transition: opacity 120ms; display: flex; gap: 3px; }
      .side-item:hover .side-item-actions { opacity: 1; }
      .side-item.active .side-item-actions { opacity: 1; }

      /* Queue specific */
      .queue-num {
        font-family: var(--mono); font-size: 10px; color: var(--text-3);
        min-width: 18px; text-align: right; flex-shrink: 0;
      }
      .queue-empty {
        text-align: center; padding: 24px 0;
        color: var(--text-3); font-size: 12px;
        line-height: 1.8;
      }

      /* ── Playlist view ────────────────────── */
      #playlistView .pl-header {
        display: flex; justify-content: space-between; align-items: center;
        margin-bottom: 14px; flex-wrap: wrap; gap: 8px;
      }
      #playlistView h2 {
        font-family: var(--mono);
        font-size: 13px; font-weight: 700;
        color: var(--text-2); text-transform: uppercase; letter-spacing: 0.05em;
      }
      .pl-create-row {
        display: flex; gap: 6px; align-items: center;
      }
      .pl-create-row input {
        padding: 6px 10px; border-radius: var(--r-sm);
        border: 1px solid var(--border); background: var(--surface-2);
        color: var(--text); font-family: var(--sans); font-size: 12px; outline: none;
        width: 160px; transition: border-color 150ms;
      }
      .pl-create-row input:focus { border-color: rgba(232,255,90,0.4); }

      .pl-card {
        background: var(--surface-2);
        border: 1px solid var(--border);
        border-radius: var(--r);
        margin-bottom: 8px;
        overflow: hidden;
        transition: border-color 150ms;
      }
      .pl-card:hover { border-color: var(--border-2); }
      .pl-card-head {
        display: flex; gap: 8px; align-items: center;
        padding: 10px 12px;
      }
      .pl-card-name {
        flex: 1; min-width: 0;
        font-weight: 600; font-size: 13px;
        cursor: pointer; background: none; border: none;
        color: var(--text); padding: 0;
        white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
        text-align: left; font-family: var(--sans);
      }
      .pl-card-name:hover { color: var(--accent); }
      .pl-count { color: var(--text-3); font-size: 11px; white-space: nowrap; }
      .pl-tracks {
        padding: 4px 12px 10px;
        border-top: 1px solid var(--border);
      }
      .pl-track {
        display: flex; gap: 8px; align-items: center;
        padding: 4px 0; font-size: 12px;
      }
      .pl-track-num { color: var(--text-3); font-size: 10px; min-width: 18px; font-family: var(--mono); }
      .pl-track-title { flex: 1; min-width: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
      .pl-track-up { color: var(--text-3); font-size: 10px; }
      .pl-rename-input {
        background: transparent; border: none; border-bottom: 1px solid var(--accent);
        color: var(--text); font-size: 13px; font-weight: 600; outline: none;
        font-family: var(--sans); min-width: 0; flex: 1;
      }

      /* ── Badge / tag ─────────────────────── */
      .badge {
        font-family: var(--mono);
        font-size: 9px; font-weight: 700;
        text-transform: uppercase; letter-spacing: 0.06em;
        padding: 2px 6px; border-radius: 3px;
        display: inline-block;
      }
      .badge-accent { background: var(--accent-dim); color: var(--accent); }
      .badge-red { background: rgba(255,79,100,0.12); color: var(--red); }
      .badge-teal { background: rgba(0,212,177,0.12); color: var(--teal); }
      .badge-muted { background: rgba(255,255,255,0.06); color: var(--text-3); }


      /* ── AI Chat ─────────────────────────── */
      #chatToggle {
        position: fixed; bottom: 16px; right: 16px; z-index: 1002;
        width: 46px; height: 46px; border-radius: 50%;
        background: linear-gradient(135deg, var(--teal), #00a896);
        border: none; cursor: pointer; font-size: 18px;
        box-shadow: 0 4px 20px rgba(0,212,177,0.3);
        display: flex; align-items: center; justify-content: center;
        transition: transform 200ms, box-shadow 200ms;
        color: #0a0a0f;
      }
      #chatToggle:hover {
        transform: scale(1.08);
        box-shadow: 0 6px 28px rgba(0,212,177,0.45);
      }
      #chatPanel {
        position: fixed; bottom: 74px; right: 16px; z-index: 1001;
        width: 340px; max-height: 460px;
        background: var(--surface);
        border: 1px solid var(--border-2);
        border-radius: var(--r-lg);
        box-shadow: 0 12px 40px rgba(0,0,0,0.6);
        display: flex; flex-direction: column;
        overflow: hidden;
        transform: scale(0.95) translateY(8px);
        opacity: 0;
        pointer-events: none;
        transition: transform 200ms cubic-bezier(0.34,1.56,0.64,1), opacity 180ms;
      }
      #chatPanel.open {
        transform: scale(1) translateY(0);
        opacity: 1;
        pointer-events: all;
      }
      #chatHead {
        padding: 12px 14px;
        border-bottom: 1px solid var(--border);
        display: flex; align-items: center; gap: 8px;
        background: rgba(0,212,177,0.04);
      }
      #chatHead h3 { margin: 0; font-size: 13px; font-weight: 600; flex: 1; }
      #chatHead .teal { color: var(--teal); font-size: 10px; font-family: var(--mono); }
      #chatMsgs {
        flex: 1; overflow-y: auto;

    /* =====================================================================
       RESONANCE — Optimised frontend
       Changes from original:
